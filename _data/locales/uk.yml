use_cases:
  title: Хто використовує Pitch Changer?
  items:
    - title: Вокальні педагоги та співаки
      body: Швидко підлаштовуйте тональність будь-якої пісні під діапазон учня. Робіть вправи в різних тональностях, пробуйте інші варіанти звучання й робіть складні пісні зручнішими для виконання.
    - title: Інструменталісти
      body: Гітаристи та інші музиканти можуть транспонувати треки в тональність, яка краще пасує інструменту або строю, без перезапису й переналаштування.
    - title: Продюсери та діджеї
      body: Перевіряйте ідеї, ремікси та переходи, зміщуючи висоту й тональність за секунди. Готуйте мінуси, стеми й заготовки для DAW або лайв-сетів.
    - title: Викладачі та учні
      body: Створюйте власні версії пісень для уроків, пояснення музичної теорії та більш зосереджених занять.
reviews:
  title: Що кажуть користувачі
  subtitle: Відгуки людей, яким сподобався Pitch Changer
  items:
    - name: Grant Kimbell
      text: Дуже раджу вибрати випадкове налаштування, тільки не надто екстремальне, і ввімкнути плейлист. Відчуття таке, ніби чуєш улюблену пісню вперше, але в зовсім іншому настрої. Якість зміни висоти чудова.
    - name: Vadim Makarov
      text: Я вокальний педагог і часто підлаштовую тональність пісень для своїх учнів. Розширення чудово працює на різних сайтах, не лише на YouTube, без збоїв і зависань. І воно дуже просте, а це великий плюс.
    - name: Nikola Negovanovic
      text: Після кількох місяців використання можу сказати, що це найкращий застосунок для зміни тональності в Chrome. Своїх грошей він точно вартий.
    - name: The Real Spiro Agnew
      text: Чудово, працює як мрія.
    - name: Ice
      text: Саме цього я й очікую від хорошого браузерного розширення.
    - name: maryam seddigh
      text: Це неймовірно. Я дуже давно шукала щось подібне.
    - name: Hans Harding
      text: Для мене як для басиста це чудовий інструмент, коли пісню потрібно зіграти в іншій тональності.
    - name: Kieran Brown
      text: Є один ютубер, який робить дуже хороші відео, але я не витримую його писклявий голос. З цим розширенням слухати стало значно легше.
    - name: lilly imaginator
      text: На мою думку, це розширення з категорії must-have. Воно чудово підходить для караоке, вивчення музики або просто для експериментів із тим, як пісня звучить вище чи нижче.
faq:
  title: Часті запитання
  items:
    - question: У чому різниця між Pitch Changer Online та Pitch Changer Offline?
      answers:
        - Pitch Changer Online — це браузерне розширення, яке змінює тональність пісень прямо на сайтах на кшталт YouTube та інших аудіо- й відеоплатформ.
        - Pitch Changer Offline — окремий застосунок для iPhone, iPad і Mac. Він працює офлайн із вашими аудіофайлами та може пакетно обробляти кілька треків одразу.
    - question: Чи потрібен інтернет для роботи Pitch Changer?
      answers:
        - Розширення Pitch Changer працює в браузері та розраховане на онлайн-контент, тому зазвичай ви використовуватимете його з підключенням до інтернету.
        - Застосунок для iPhone, iPad і Mac повністю працює офлайн із локальними аудіофайлами, тож після встановлення активне з'єднання не потрібне.
    - question: Які аудіоформати підтримує Pitch Changer Offline?
      answers:
        - Застосунок для iPhone, iPad і Mac підтримує популярні формати на кшталт MP3, WAV, FLAC та інші, тож ви можете обробляти файли, які вже маєте, без попереднього конвертування.
        - Також можна додавати відео, регіони з DAW і цілі папки. Pitch Changer сам дістане з них аудіо.
    - question: Чи впливає зміна висоти на якість звуку?
      answers:
        - Pitch Changer створений так, щоб зберігати якість звуку, поки ви змінюєте тональність. Користувачі регулярно пишуть, що якість зміни висоти справді чудова.
        - Як і під час будь-якої цифрової обробки, надто екстремальні зміни можуть звучати менш природно, але в більшості випадків результат лишається чистим і музичним.
    - question: Не можу знайти інструментальні версії пісень. Можете допомогти?
      answers: []
      answer_html: Спробуйте наш <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>. Він прибирає вокал із пісні онлайн або офлайн і чудово поєднується з Pitch Changer.
    - question: Як змінити темп пісні?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Якщо потрібно сповільнити або пришвидшити музику прямо на сайті, поки вона вже грає, скористайтеся TOOL_LINK.
        - tool_key: speed_tool
          template: Якщо потрібно змінити темп власного файла, зберігши тональність, скористайтеся TOOL_LINK.
    - question: Чи є безкоштовний пробний період? Як працює оплата?
      answers:
        - І розширення, і застосунок для iPhone, iPad і Mac мають безкоштовний пробний період без картки.
        - Після пробного періоду Pitch Changer Online пропонує тижневі, річні та разову покупку, а Pitch Changer Offline — тижневі та річні підписки, як указано вище.
        - Усі платежі безпечно обробляються через Paddle для розширення або через Apple для застосунку.
    - question: Як скасувати підписку?
      answers:
        - Натисніть кнопку Manage Subscription у застосунку або розширенні та дотримуйтеся підказок.
        - Процес повністю автоматичний, тож телефонувати чи писати листи не потрібно.
    - question: Для кого створено Pitch Changer?
      answers:
        - Pitch Changer створений для співаків, музикантів, продюсерів, діджеїв, викладачів і всіх, кому потрібно змінювати тональність пісень.
        - Якщо ви займаєтеся вдома, виступаєте наживо, навчаєте учнів або готуєте матеріали, він допомагає швидко перевести музику в тональність, яка підходить саме вам.
