overview:
  title: Що таке Pitch Changer?
  paragraphs:
    - Pitch Changer дає змогу змінювати тональність пісень на будь-якому сайті та транспонувати музику на комп'ютері без складних аудіоредакторів. Його створено для реальних задач — занять, викладання, запису й просто задоволення від улюблених треків у зручнішій тональності.
    - "За допомогою Pitch Changer можна:"
  bullets:
    - Піднімати або опускати тональність пісні на півтони.
    - Займатися в тональності, яка краще підходить вашому голосу або інструменту.
    - Готувати мінусовки, караоке-версії та навчальні матеріали.
    - Шукати нові аранжування, гармонії та творчі варіанти зміни висоти.
  versions_intro: "Pitch Changer доступний у двох версіях:"
  online_link_label: Змінити тональність пісні онлайн
  online_link_suffix: як розширення для сайтів, і
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: як застосунок для iPhone, iPad і Mac для роботи з файлами.
