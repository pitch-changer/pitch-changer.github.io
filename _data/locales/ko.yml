  image_alt: Pitch Changer를 iPhone, iPad 또는 Mac에 다운로드해 프로젝트를 알맞은 키로 맞춰 두세요.
use_cases:
  title: 누가 Pitch Changer를 사용할까요?
  items:
    - title: 보컬 코치와 가수
      body: 학생의 음역에 맞게 어떤 곡이든 빠르게 키를 조정할 수 있습니다. 여러 키로 연습하고, 다른 조성을 시도하고, 어려운 곡도 더 편하게 부를 수 있게 만드세요.
    - title: 연주자
      body: 기타리스트와 다른 연주자들은 다시 녹음하거나 재튜닝하지 않고도 자신의 악기나 튜닝에 더 잘 맞는 키로 트랙을 옮길 수 있습니다.
    - title: 프로듀서와 DJ
      body: 피치와 키를 몇 초 만에 움직여 아이디어, 리믹스, 전환을 시험해 보세요. DAW나 라이브 셋용 반주, 스템, 스케치를 준비하는 데도 좋습니다.
    - title: 교사와 학습자
      body: 수업, 음악 이론 설명, 집중 연습을 위한 맞춤형 곡 버전을 만들 수 있습니다.
reviews:
  title: 사용자 후기
  subtitle: Pitch Changer를 써 본 사람들이 남긴 이야기입니다
  items:
    - name: Grant Kimbell
      text: 너무 과하지 않은 랜덤 설정 하나를 골라 플레이리스트를 섞어 들어 보라고 정말 추천하고 싶습니다. 좋아하는 곡을 완전히 다른 분위기로 처음 다시 듣는 느낌이 납니다. 피치 이동 품질도 아주 훌륭합니다.
    - name: Vadim Makarov
      text: 저는 보컬 코치라 학생들을 위해 곡 키를 자주 조정해야 합니다. 이 확장 프로그램은 YouTube뿐 아니라 여러 웹사이트에서 버그나 충돌 없이 완벽하게 작동합니다. 게다가 아주 단순해서 그 점도 큰 장점입니다.
    - name: Nikola Negovanovic
      text: 몇 달 동안 사용해 본 결과, Chrome에서 쓸 수 있는 최고의 피치 체인저 앱이라고 확신합니다. 가격이 아깝지 않습니다.
    - name: The Real Spiro Agnew
      text: 훌륭합니다. 꿈처럼 잘 작동해요.
    - name: Ice
      text: 좋은 브라우저 확장 프로그램에서 기대하는 바로 그 모습입니다.
    - name: maryam seddigh
      text: 정말 놀라워요. 이런 걸 오랫동안 찾고 있었습니다.
    - name: Hans Harding
      text: 곡을 다른 키로 연주해야 할 때 베이스 연주자인 저에게 정말 좋은 도구입니다.
    - name: Kieran Brown
      text: 정말 좋은 영상을 만드는 유튜버가 있는데 목소리가 너무 거슬렸습니다. 이걸 쓰니 훨씬 듣기 편해졌어요.
    - name: lilly imaginator
      text: 제 기준에서는 꼭 있어야 할 확장 프로그램입니다. 노래방, 음악 공부, 또는 곡이 더 높거나 낮게 들리면 어떤 느낌인지 놀아 보기에 아주 좋습니다.
faq:
  title: 자주 묻는 질문
  items:
    - question: Pitch Changer Online과 Pitch Changer Offline의 차이는 무엇인가요?
      answers:
        - Pitch Changer Online은 YouTube 같은 웹사이트와 다른 오디오 또는 비디오 플랫폼에서 곡의 키를 바로 바꿔 주는 브라우저 확장 프로그램입니다.
        - Pitch Changer Offline은 iPhone, iPad, Mac용 독립 앱으로, 내 오디오 파일을 오프라인에서 다루며 여러 트랙을 한 번에 일괄 처리할 수 있습니다.
    - question: Pitch Changer를 사용하려면 인터넷 연결이 필요한가요?
      answers:
        - Pitch Changer 확장 프로그램은 브라우저 안에서 작동하고 온라인 콘텐츠용으로 설계되었기 때문에 보통 인터넷에 연결된 상태에서 사용하게 됩니다.
        - iPhone, iPad, Mac 앱은 로컬 오디오 파일로 완전히 오프라인에서 동작하므로 설치 후에는 활성 연결 없이도 사용할 수 있습니다.
    - question: Pitch Changer Offline은 어떤 오디오 포맷을 지원하나요?
      answers:
        - iPhone, iPad, Mac 앱은 MP3, WAV, FLAC 같은 일반적인 오디오 포맷을 지원하므로 이미 가지고 있는 파일을 별도 변환 없이 바로 처리할 수 있습니다.
        - 비디오, DAW의 구간, 폴더 전체도 추가할 수 있으며 Pitch Changer가 오디오를 알아서 추출해 줍니다.
    - question: 피치를 바꾸면 음질에 영향이 있나요?
      answers:
        - Pitch Changer는 키를 조정하는 동안 음질을 최대한 유지하도록 설계되었습니다. 실제 사용자들도 피치 이동 품질이 아주 좋다고 자주 말합니다.
        - 다른 디지털 피치 변환과 마찬가지로 아주 극단적인 설정에서는 더 부자연스럽게 들릴 수 있지만, 대부분의 경우 결과는 깨끗하고 음악적으로 유지됩니다.
    - question: 연주용 버전의 곡을 찾기 어렵습니다. 도와줄 수 있나요?
      answers: []
      answer_html: <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>도 함께 써 보세요. 곡에서 보컬을 온라인이나 오프라인으로 제거할 수 있고 Pitch Changer와도 잘 어울립니다.
    - question: 곡의 템포는 어떻게 바꿀 수 있나요?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: 이미 재생 중인 웹사이트 음악을 느리게 하거나 빠르게 하고 싶다면 TOOL_LINK를 사용하세요.
        - tool_key: speed_tool
          template: 내 파일의 템포를 바꾸면서 피치는 유지하고 싶다면 TOOL_LINK를 사용하세요.
    - question: 무료 체험이 있나요? 가격은 어떻게 되나요?
      answers:
        - 확장 프로그램과 iPhone, iPad, Mac 앱 모두 카드 없이 시작할 수 있는 무료 체험 기간이 있습니다.
        - 체험 후에는 Pitch Changer Online에서 주간, 연간, 일회성 구매 옵션을 제공하고, Pitch Changer Offline에서는 주간 및 연간 구독을 제공합니다.
        - 모든 결제는 확장 프로그램은 Paddle, 앱은 Apple을 통해 안전하게 처리됩니다.
    - question: 구독은 어떻게 취소하나요?
      answers:
        - 앱이나 확장 프로그램 안의 Manage Subscription 버튼을 누르고 안내를 따라가세요.
        - 절차는 완전히 자동이므로 전화나 이메일을 보낼 필요가 없습니다.
    - question: Pitch Changer는 어떤 사람을 위한 도구인가요?
      answers:
        - Pitch Changer는 가수, 뮤지션, 프로듀서, DJ, 교사, 그리고 곡의 키를 조정해야 하는 모든 사람을 위해 만들어졌습니다.
        - 집에서 연습할 때든, 라이브를 준비할 때든, 학생을 가르칠 때든, 자료를 만들 때든, 나에게 맞는 키로 음악을 빠르게 옮길 수 있게 도와줍니다.
