overview:
  title: Pitch Changer란?
  paragraphs:
    - Pitch Changer를 사용하면 복잡한 오디오 소프트웨어 없이 어떤 웹사이트에서든 곡의 키를 바꾸고 컴퓨터에서 음악을 트랜스포즈할 수 있습니다. 연습, 레슨, 녹음, 또는 좋아하는 곡을 더 편한 키로 듣고 싶을 때 바로 쓸 수 있도록 만들어졌습니다.
    - "Pitch Changer로 할 수 있는 일:"
  bullets:
    - 곡 키를 반음 단위로 올리거나 내리기.
    - 목소리나 악기에 더 잘 맞는 키로 연습하기.
    - 반주 트랙, 노래방 버전, 레슨 자료 준비하기.
    - 편곡, 화성, 창의적인 피치 변화를 실험하기.
  versions_intro: "Pitch Changer는 두 가지 버전으로 제공됩니다:"
  online_link_label: 음정 변조기
  online_link_suffix: 웹사이트용 브라우저 확장 프로그램이고,
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: 파일 작업을 위한 iPhone, iPad, Mac 앱입니다.
online:
  title: 음정 변조기
  paragraphs:
    - 음정 변조기를 사용하면 재생 중인 곡의 키도 손쉽게 바꿀 수 있습니다. 브라우저를 벗어나지 않고 음악을 트랜스포즈하고 싶을 때 간편합니다.
    - Pitch Changer Online은 브라우저 안에 바로 키 조절 기능을 추가합니다. YouTube와 여러 오디오 웹사이트에서 몇 번의 클릭만으로 곡의 키를 조절할 수 있습니다.
  bullets:
    - 어떤 웹사이트에서든 온라인으로 곡 키를 바꾸기.
    - YouTube 키 체인저처럼, 다른 음악 플랫폼에서도 사용 가능.
    - 직관적인 컨트롤로 반음 단위 피치 조절.
    - 함께 연습하거나, 노래방을 하거나, 더 편한 키로 감상할 때 유용함.
  perfect_for_label: "이런 분께 잘 맞습니다:"
  perfect_for_text: 가수, 보컬 코치, 교사, 학교, 연주자, 그리고 온라인 영상으로 연습하는 모든 사람.
  pricing_template: "무료 체험 후: WEEKLY_PRICE, YEARLY_PRICE 또는 LIFETIME_PRICE."
