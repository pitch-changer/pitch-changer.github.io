offline:
  title: Pitch Changer Offline
  paragraphs:
    - 연습부터 프로덕션까지, Pitch Changer는 곡 트랜스포즈, 피치 이동, 키 변경, 오디오 일괄 처리를 정밀하게 도와줍니다.
    - iPhone, iPad, Mac용 Pitch Changer에서는 오디오 파일을 가져오고, 속도를 바꾸지 않은 채 피치를 조절하고, 폴더 전체를 일괄 처리해 연습용 트랙, 레슨 자료, 프로덕션 프로젝트를 준비할 수 있습니다.
  bullets:
    - 오디오 파일의 피치를 빠르고 정확하게 바꾸기.
    - 템포를 바꾸지 않고 음악을 위아래로 트랜스포즈하기.
    - 여러 곡을 한 번에 일괄 처리하기.
    - 인터넷 연결 없이 오프라인으로 사용하기.
    - MP3, WAV, FLAC 등 일반적인 포맷 지원.
  perfect_for_label: "이런 분께 잘 맞습니다:"
  perfect_for_text: 로컬 오디오 파일을 다루는 프로듀서, DJ, 교사, 뮤지션.
  pricing_template: "무료 체험 후: WEEKLY_PRICE 또는 YEARLY_PRICE."
  offer_templates:
    weekly: "주당 PRICE_VALUE $"
    yearly: "연간 PRICE_VALUE $"
