  image_alt: Pitch Changer を iPhone、iPad、Mac にダウンロードして、曲をちょうどよいキーに整えましょう。
use_cases:
  title: Pitch Changer はどんな人が使う？
  items:
    - title: ボイストレーナーと歌手
      body: 生徒の声域に合わせて曲のキーをすばやく調整できます。いろいろなキーで練習したり、別の選択肢を試したり、難しい曲を歌いやすくしたりできます。
    - title: 演奏者
      body: ギタリストをはじめとする演奏者は、録り直しや再チューニングなしで、自分の楽器やチューニングに合うキーへトラックを移調できます。
    - title: プロデューサーと DJ
      body: ピッチやキーを数秒で動かしながら、アイデア、リミックス、つなぎを試せます。DAW やライブ用のバッキング、ステム、スケッチの準備にも役立ちます。
    - title: 先生と学習者
      body: 授業、音楽理論の説明、集中した練習セッションのために、曲のカスタム版を作れます。
reviews:
  title: ユーザーの声
  subtitle: Pitch Changer を使った人たちの感想です
  items:
    - name: Grant Kimbell
      text: 極端すぎない範囲でランダムな設定を選んでプレイリストを流してみるのを本当におすすめします。大好きな曲をまるで初めて別の雰囲気で聴くような感覚になります。ピッチ変更の質もとても高いです。
    - name: Vadim Makarov
      text: 私はボイストレーナーで、生徒のために曲のキーをよく調整します。この拡張機能は YouTube だけでなくいろいろなサイトで安定して動き、バグやクラッシュもありません。しかもとても簡単で、それが大きな強みです。
    - name: Nikola Negovanovic
      text: 何か月も使ってきましたが、Chrome で使うキー変更アプリとしてこれが一番だと言えます。十分に価値があります。
    - name: The Real Spiro Agnew
      text: 素晴らしいです。夢のように動きます。
    - name: Ice
      text: まさにブラウザ拡張機能に期待する通りのものです。
    - name: maryam seddigh
      text: 最高です。こういうものをずっと探していました。
    - name: Hans Harding
      text: 曲を別のキーで弾かなければならないとき、ベーシストの自分には本当に助かるツールです。
    - name: Kieran Brown
      text: とても良い動画を作る YouTuber がいるのですが、あの鼻にかかった声が苦手でした。これを使うとずっと聴きやすくなります。
    - name: lilly imaginator
      text: 個人的には必須の拡張機能です。カラオケ、音楽学習、あるいは曲が高くなったり低くなったりするとどう聴こえるか試したいときにぴったりです。
faq:
  title: よくある質問
  items:
    - question: Pitch Changer Online と Pitch Changer Offline の違いは何ですか？
      answers:
        - Pitch Changer Online は、YouTube などのサイトやほかの音声・動画プラットフォーム上で曲のキーを直接変えられるブラウザ拡張機能です。
        - Pitch Changer Offline は、iPhone、iPad、Mac 向けの単体アプリで、自分の音声ファイルをオフラインで扱い、複数トラックをまとめて処理できます。
    - question: Pitch Changer を使うのにインターネット接続は必要ですか？
      answers:
        - Pitch Changer 拡張機能はブラウザ上で動作し、オンラインコンテンツ向けなので、通常はインターネット接続中に使います。
        - iPhone、iPad、Mac アプリはローカル音声ファイルで完全にオフライン動作するため、インストール後は接続がなくても使えます。
    - question: Pitch Changer Offline はどの音声形式に対応していますか？
      answers:
        - iPhone、iPad、Mac アプリは MP3、WAV、FLAC などの一般的な形式に対応しているので、手元のファイルをそのまま処理できます。
        - 動画、DAW のリージョン、フォルダ全体も追加できます。Pitch Changer が音声を取り出します。
    - question: ピッチを変えると音質は変わりますか？
      answers:
        - Pitch Changer はキーを調整している間も音質を保てるように設計されています。ユーザーからもピッチ変更の品質が高いという声が多く届いています。
        - どんなデジタル処理でも極端な変化では不自然に聴こえることがありますが、多くの場合はきれいで音楽的なままです。
    - question: 曲のインスト版が見つかりません。助けてもらえますか？
      answers: []
      answer_html: <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a> を試してください。曲からボーカルをオンラインでもオフラインでも取り除けて、Pitch Changer と相性がとても良いです。
    - question: 曲のテンポはどうやって変えられますか？
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: すでに再生中のサイト上の音楽を遅くしたり速くしたりしたいなら、TOOL_LINK を使ってください。
        - tool_key: speed_tool
          template: 自分のファイルのテンポを変えつつピッチを保ちたいなら、TOOL_LINK を使ってください。
    - question: 無料体験はありますか？ 料金はどうなりますか？
      answers:
        - 拡張機能にも iPhone、iPad、Mac アプリにも、カード不要の無料体験期間があります。
        - 体験後は、Pitch Changer Online では週額、年額、買い切りの選択肢があり、Pitch Changer Offline では週額と年額のサブスクリプションがあります。
        - 支払いは拡張機能では Paddle、アプリでは Apple を通じて安全に処理されます。
    - question: サブスクリプションはどうやって解約しますか？
      answers:
        - アプリまたは拡張機能内の Manage Subscription ボタンを押して案内に従ってください。
        - 手続きは完全に自動なので、電話やメールは必要ありません。
    - question: Pitch Changer はどんな人向けですか？
      answers:
        - Pitch Changer は歌手、ミュージシャン、プロデューサー、DJ、先生、そして曲のキーを調整したいすべての人のために作られています。
        - 自宅で練習するときも、ライブで演奏するときも、指導するときも、素材を準備するときも、自分に合うキーへすばやく音楽を持っていけます。
