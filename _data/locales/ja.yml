overview:
  title: Pitch Changer とは？
  paragraphs:
    - Pitch Changer を使えば、どのサイトでも曲のキーを変えたり、複雑な音声ソフトなしでパソコン上の音楽を移調したりできます。練習、指導、録音、そして好きな曲をもっと気持ちよく聴くための実用的な道具です。
    - "Pitch Changer でできること:"
  bullets:
    - 曲のキーを半音単位で上げ下げする。
    - 声や楽器に合ったキーで練習する。
    - バッキングトラック、カラオケ版、教材用素材を用意する。
    - アレンジ、ハーモニー、創作的なピッチ移動を試す。
  versions_intro: "Pitch Changer には 2 つのバージョンがあります:"
  online_link_label: ピッチシフター
  online_link_suffix: はサイト向けのブラウザ拡張機能、そして
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: はファイル向けの iPhone、iPad、Mac アプリです。
online:
  title: ピッチシフター
  paragraphs:
    - ピッチシフターを使えば、再生中の曲でもすぐにキーを変えられます。ブラウザを離れずに音楽を移調したいときに便利です。
    - Pitch Changer Online はブラウザの中にキー変更コントロールを追加します。YouTube やそのほか多くの音声サイトで、数クリックでキーを調整できます。
  bullets:
    - どのサイトでもオンラインで曲のキーを変えられる。
    - YouTube のキー変更ツールとしても、ほかの音楽サイトでも使える。
    - 半音単位でわかりやすくピッチを調整できる。
    - 合わせ練習、カラオケ、聴きやすいキー探しに向いている。
  perfect_for_label: "向いているのは:"
  perfect_for_text: 歌手、ボイストレーナー、先生、学校、演奏者、そしてオンライン動画で練習するすべての人です。
  pricing_template: "無料体験後: WEEKLY_PRICE、YEARLY_PRICE、または LIFETIME_PRICE。"
  offer_templates:
    weekly: "週額 PRICE_VALUE $"
    yearly: "年額 PRICE_VALUE $"
    lifetime: "買い切り PRICE_VALUE $"
