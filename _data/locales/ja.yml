  image_alt: Pitch Changer 拡張機能をインストールして、すぐにブラウザへ追加します。
offline:
  title: Pitch Changer Offline
  paragraphs:
    - 練習から制作まで、Pitch Changer は移調、ピッチ変更、キー変更、まとめての音声処理を正確にこなします。
    - iPhone、iPad、Mac 向け Pitch Changer では、音声ファイルを読み込み、速度を変えずにピッチを動かし、フォルダ単位でまとめて処理して練習用トラック、教材、制作素材を用意できます。
  bullets:
    - 音声ファイルのピッチをすばやく正確に変える。
    - テンポを変えずに音楽を上下に移調する。
    - 複数の曲をまとめて処理する。
    - インターネット接続なしでオフライン動作する。
    - MP3、WAV、FLAC など一般的な形式に対応する。
  perfect_for_label: "向いているのは:"
  perfect_for_text: ローカルの音声ファイルを扱うプロデューサー、DJ、先生、ミュージシャンです。
  pricing_template: "無料体験後: WEEKLY_PRICE または YEARLY_PRICE。"
  offer_templates:
    weekly: "週額 PRICE_VALUE $"
    yearly: "年額 PRICE_VALUE $"
