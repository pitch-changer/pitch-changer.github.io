  cta: Agregar Cambiar Tono Cancion a tu navegador
  image_alt: Instala la extensión Pitch Changer y agrégala al navegador en segundos.
offline:
  title: Pitch Changer Offline
  paragraphs:
    - Desde la práctica hasta la producción, Pitch Changer te ayuda a transponer, mover la afinación, cambiar la tonalidad de canciones y procesar lotes de audio con precisión.
    - Con Pitch Changer para iPhone, iPad y Mac puedes importar archivos de audio, cambiar afinación sin mover la velocidad y procesar carpetas completas para preparar pistas de práctica, material didáctico o proyectos profesionales.
  bullets:
    - Cambia la afinación de archivos de audio de forma rápida y precisa.
    - Transpone música hacia arriba o hacia abajo sin cambiar el tempo.
    - Procesa varias canciones en una sola pasada.
    - Funciona offline sin conexión activa a internet.
    - Soporta formatos comunes como MP3, WAV, FLAC y más.
  perfect_for_label: "Ideal para:"
  perfect_for_text: productores, DJ, docentes y músicos que trabajan con archivos de audio locales.
  pricing_template: "Después de la prueba gratuita: WEEKLY_PRICE o YEARLY_PRICE."
