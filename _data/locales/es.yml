use_cases:
  title: ¿Quién usa Pitch Changer?
  items:
    - title: Coaches vocales y cantantes
      body: Ajusta rápidamente la tonalidad de cualquier canción al rango vocal de un estudiante. Haz ejercicios en distintas tonalidades, prueba opciones nuevas y vuelve más cantables las canciones difíciles.
    - title: Instrumentistas
      body: Guitarristas y otros instrumentistas pueden transponer pistas a la tonalidad que mejor le quede al instrumento o a la afinación sin volver a grabar ni reacomodar el instrumento.
    - title: Productores y DJ
      body: Prueba ideas, remixes y transiciones moviendo afinación y tonalidad en segundos. Prepara bases, stems y bocetos para tu DAW o para el escenario.
    - title: Docentes y estudiantes
      body: Crea versiones personalizadas de canciones para clases, demostraciones de teoría musical y sesiones de práctica más enfocadas.
reviews:
  title: Lo que dicen nuestros usuarios
  subtitle: Esto cuentan quienes probaron Pitch Changer
  items:
    - name: Grant Kimbell
      text: De verdad recomiendo elegir un ajuste al azar, sin irte al extremo, y poner la playlist. Se siente como escuchar una canción que amas por primera vez, pero con una vibra totalmente distinta. La calidad del cambio de afinación es excelente.
    - name: Vadim Makarov
      text: Soy coach vocal y seguido necesito ajustar la tonalidad de canciones para mis estudiantes. La extensión funciona perfecto en distintos sitios, no solo en YouTube, sin errores ni cierres inesperados. Además es muy simple, y eso es una gran ventaja.
    - name: Nikola Negovanovic
      text: Después de varios meses usándola, puedo decir que es la mejor app para cambiar tonalidad en Chrome. Sí vale la pena.
    - name: The Real Spiro Agnew
      text: Excelente, funciona de maravilla.
    - name: Ice
      text: Es exactamente lo que espero de una buena extensión de navegador.
    - name: maryam seddigh
      text: Es increíble. Llevaba mucho tiempo buscando algo así.
    - name: Hans Harding
      text: Gran herramienta para mí como bajista cuando una canción hay que tocarla en otra tonalidad.
    - name: Kieran Brown
      text: Hay un youtuber que hace videos muy buenos pero no soporto su vocecita chillona. Con esto se vuelve mucho más fácil escucharlo.
    - name: lilly imaginator
      text: Para mí es una extensión imprescindible. Es genial para karaoke, para aprender música o simplemente para jugar con cómo suena una canción más alta o más baja.
faq:
  title: Preguntas frecuentes
  items:
    - question: ¿Cuál es la diferencia entre Pitch Changer Online y Pitch Changer Offline?
      answers:
        - Pitch Changer Online es una extensión de navegador que cambia la tonalidad de canciones directamente en sitios como YouTube y otras plataformas de audio o video.
        - Pitch Changer Offline es una app independiente para iPhone, iPad y Mac que trabaja offline con tus propios archivos de audio y puede procesar varias pistas a la vez.
    - question: ¿Necesito internet para usar Pitch Changer?
      answers:
        - La extensión Pitch Changer funciona dentro del navegador y está pensada para contenido online, así que normalmente la usarás mientras estés conectado a internet.
        - La app para iPhone, iPad y Mac funciona completamente offline con archivos de audio locales, así que después de instalarla no necesitas conexión activa.
    - question: ¿Qué formatos de audio soporta Pitch Changer Offline?
      answers:
        - La app para iPhone, iPad y Mac trabaja con formatos comunes como MP3, WAV, FLAC y más, así que puedes procesar los archivos que ya tienes sin convertirlos antes.
        - También puedes agregar videos, regiones desde tu DAW y carpetas completas. Pitch Changer extrae el audio por ti.
    - question: ¿Cambiar la afinación afecta la calidad del audio?
      answers:
        - Pitch Changer está diseñado para conservar la calidad del audio mientras ajustas la tonalidad. Nuestros usuarios comentan con frecuencia que la calidad del pitch shift es excelente.
        - Como con cualquier procesamiento digital, cambios muy extremos pueden sonar menos naturales, pero en la mayoría de los casos el resultado sigue siendo limpio y musical.
    - question: No encuentro versiones instrumentales de canciones. ¿Pueden ayudarme?
      answers: []
      answer_html: Prueba nuestro <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>. Quita la voz de una canción online u offline y combina muy bien con Pitch Changer.
    - question: ¿Cómo puedo cambiar el tempo de una canción?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Si quieres ralentizar o acelerar música en un sitio mientras ya está sonando, usa TOOL_LINK.
        - tool_key: speed_tool
          template: Si quieres cambiar el tempo de tu propio archivo manteniendo estable la afinación, usa TOOL_LINK.
    - question: ¿Hay prueba gratuita? ¿Cómo funciona el precio?
      answers:
        - Tanto la extensión como la app para iPhone, iPad y Mac incluyen un periodo de prueba gratis sin tarjeta.
        - Después de la prueba, Pitch Changer Online ofrece planes semanales, anuales y compra única, mientras que Pitch Changer Offline ofrece suscripciones semanales y anuales, como se indica arriba.
        - Todos los pagos se gestionan de forma segura mediante Paddle para la extensión o Apple para la app.
    - question: ¿Cómo cancelo mi suscripción?
      answers:
        - Haz clic en el botón Manage Subscription dentro de la app o la extensión y sigue las instrucciones.
        - El proceso es totalmente automático, así que no hace falta llamar ni mandar correos.
    - question: ¿Para quién está hecho Pitch Changer?
      answers:
        - Pitch Changer está hecho para cantantes, músicos, productores, DJ, docentes y cualquiera que necesite ajustar la tonalidad de canciones.
        - Ya sea que practiques en casa, toques en vivo, enseñes a estudiantes o prepares material, te da una forma rápida de llevar la música a la tonalidad que te funciona mejor.
