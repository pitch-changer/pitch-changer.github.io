overview:
  title: ¿Qué es Pitch Changer?
  paragraphs:
    - Pitch Changer te permite cambiar la tonalidad de canciones en cualquier sitio y transponer música en tu computadora sin software de audio complicado. Está hecho para situaciones reales como practicar, enseñar, grabar o simplemente disfrutar tus canciones favoritas en una tonalidad más cómoda.
    - "Con Pitch Changer puedes:"
  bullets:
    - Cambiar la tonalidad de una canción hacia arriba o hacia abajo por semitonos.
    - Practicar en la tonalidad que mejor le queda a tu voz o a tu instrumento.
    - Preparar pistas de acompañamiento, versiones karaoke y material didáctico.
    - Probar arreglos, armonías y cambios creativos de afinación.
  versions_intro: "Pitch Changer está disponible en dos versiones:"
  online_link_label: Cambiar Tono Cancion
  online_link_suffix: como extensión para sitios web, y
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: como app para iPhone, iPad y Mac para trabajar con archivos.
online:
  title: Cambiar Tono Cancion
  paragraphs:
    - Usa Cambiar Tono Cancion para cambiar fácilmente la tonalidad de canciones mientras ya están sonando. Es una forma práctica de transponer música sin salir del navegador.
    - Pitch Changer Online agrega un control de tonalidad directo en tu navegador. Cambia la tonalidad en YouTube y en muchos otros sitios de audio con solo unos clics.
  bullets:
    - Cambia la tonalidad de una canción online directamente en cualquier sitio.
    - Funciona como herramienta para cambiar tonalidad en YouTube y en otras plataformas musicales.
    - Ajusta la afinación por semitonos con controles claros.
    - Va muy bien para practicar con una pista, hacer karaoke o escuchar en una tonalidad más cómoda.
  perfect_for_label: "Ideal para:"
  perfect_for_text: cantantes, coaches vocales, docentes, escuelas, instrumentistas y cualquiera que practique con videos online.
  pricing_template: "Después de la prueba gratuita: WEEKLY_PRICE, YEARLY_PRICE o LIFETIME_PRICE."
  offer_templates:
    weekly: "PRICE_VALUE $ por semana"
