  title: Pitch Changer Offline
  paragraphs:
    - От домашних занятий до продакшена — Pitch Changer помогает транспонировать, менять высоту, менять тональность песен и обрабатывать аудио-пакеты точно и удобно.
    - Полный контроль над звуком на iPhone, iPad и Mac. Импортируйте аудиофайлы, меняйте высоту без изменения скорости и обрабатывайте целые папки, чтобы готовить треки для репетиций, уроков и рабочих проектов.
  bullets:
