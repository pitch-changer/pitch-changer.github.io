overview:
  title: Что такое Pitch Changer?
  paragraphs:
    - Pitch Changer позволяет менять тональность песен на любом сайте, а также транспонировать музыку и менять высоту звука на компьютере без сложных аудиоредакторов. Он создан для реальных задач — репетиций, занятий, записи и просто удовольствия от любимых треков.
    - "С помощью Pitch Changer можно:"
  bullets:
    - Поднимать или опускать тональность песни по полутонам.
    - Репетировать в тональности, которая подходит вашему голосу или инструменту.
    - Готовить минусовки, караоке-версии и учебные материалы.
    - Искать новые аранжировки, гармонии и творческие варианты изменения высоты.
  versions_intro: "Pitch Changer доступен в двух версиях:"
  online_link_label: Pitch Changer Online
  online_link_suffix: как расширение для сайтов, и
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: как приложение для iPhone, iPad и Mac для работы с файлами.
online:
  title: Pitch Changer Online
  paragraphs:
    - Используйте «Изменить тональность», чтобы легко менять тональность песен онлайн. Это удобное расширение помогает быстро транспонировать музыку прямо во время прослушивания.
    - Pitch Changer Online добавляется прямо в браузер. Меняйте тональность песен на YouTube и других аудио-сайтах всего за несколько кликов.
  bullets:
    - Меняйте тональность песни онлайн прямо на любом сайте.
    - Работает как инструмент для изменения тональности на YouTube и на других музыкальных платформах.
    - Меняйте высоту по полутонам с понятным управлением.
    - Отлично подходит для репетиций, караоке и обычного прослушивания.
  perfect_for_label: "Отлично подходит для:"
  perfect_for_text: певцов, вокальных педагогов, преподавателей, школ, инструменталистов и всех, кто занимается под онлайн-видео.
