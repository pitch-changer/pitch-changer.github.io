use_cases:
  title: Кто использует Pitch Changer?
  items:
    - title: Вокальные педагоги и певцы
      body: Быстро подбирайте тональность любой песни под диапазон ученика. Проводите упражнения в разных тональностях, пробуйте новые варианты звучания и делайте сложные песни удобнее для исполнения.
    - title: Инструменталисты
      body: Гитаристы и другие музыканты могут транспонировать треки в тональность, которая лучше подходит инструменту или строю, без перезаписи и перенастройки.
    - title: Продюсеры и диджеи
      body: Проверяйте идеи, ремиксы и переходы, меняя высоту и тональность за секунды. Готовьте подложки, стемы и заготовки для DAW или лайв-сетов.
    - title: Преподаватели и учащиеся
      body: Создавайте специальные версии песен для уроков, музыкальной теории и целенаправленной практики.
reviews:
  title: Что говорят пользователи
  subtitle: Вот что рассказывают люди, которым понравился Pitch Changer
  items:
    - name: Grant Kimbell
      text: Очень рекомендую выбрать случайную настройку, но не слишком экстремальную, и включить плейлист. Ощущение такое, будто слышишь любимую песню впервые, только в совершенно другом вайбе. Качество изменения высоты отличное.
    - name: Vadim Makarov
      text: Я вокальный педагог и часто подстраиваю тональность песен под учеников. Расширение работает отлично на разных сайтах, не только на YouTube, без ошибок и вылетов. И оно очень простое, а это огромный плюс.
    - name: Nikola Negovanovic
      text: После нескольких месяцев использования могу сказать, что это лучшее приложение для изменения тональности в Chrome. Оно точно стоит своих денег.
    - name: The Real Spiro Agnew
      text: Отлично, работает как мечта.
    - name: Ice
      text: Именно этого я и жду от хорошего браузерного расширения.
    - name: maryam seddigh
      text: Это потрясающе. Я очень давно искала именно такое решение.
    - name: Hans Harding
      text: Отличный инструмент для меня как для басиста, когда песню нужно сыграть в другой тональности.
    - name: Kieran Brown
      text: Есть один ютубер с отличными видео, но его голос меня утомляет. С этим расширением слушать стало намного приятнее.
    - name: lilly imaginator
      text: На мой взгляд, это расширение из разряда must-have. Оно отлично подходит для караоке, изучения музыки или просто экспериментов с тем, как песня звучит выше или ниже.
faq:
  title: Часто задаваемые вопросы
  items:
    - question: В чем разница между Pitch Changer Online и Pitch Changer Offline?
      answers:
        - Pitch Changer Online — это расширение для браузера, которое меняет тональность песен прямо на сайтах вроде YouTube и других аудио- и видеоплатформ.
        - Pitch Changer Offline — отдельное приложение для iPhone, iPad и Mac. Оно работает офлайн с вашими аудиофайлами и умеет пакетно обрабатывать сразу несколько треков.
    - question: Нужен ли интернет для работы Pitch Changer?
      answers:
        - Расширение Pitch Changer работает в браузере и рассчитано на онлайн-контент, поэтому обычно вы будете использовать его при подключении к интернету.
        - Приложение для iPhone, iPad и Mac полностью работает офлайн с локальными аудиофайлами, поэтому после установки активное подключение не требуется.
    - question: Какие аудиоформаты поддерживает Pitch Changer Offline?
      answers:
        - Приложение для iPhone, iPad и Mac поддерживает популярные форматы вроде MP3, WAV, FLAC и другие, поэтому вы можете обрабатывать уже имеющиеся файлы без предварительной конвертации.
        - Также можно добавлять видео, регионы из DAW и целые папки. Pitch Changer сам извлечет из них аудио.
    - question: Влияет ли изменение высоты на качество звука?
      answers:
        - Pitch Changer старается сохранять качество звука, пока вы меняете тональность. Пользователи часто отмечают, что качество изменения высоты действительно отличное.
        - Как и при любой цифровой обработке, слишком экстремальные изменения могут звучать менее естественно, но в большинстве случаев результат остается чистым и музыкальным.
    - question: Не могу найти инструментальные версии песен. Можете помочь?
      answers: []
      answer_html: Попробуйте наш <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>. Он удаляет вокал из песни онлайн или офлайн и отлично сочетается с Pitch Changer.
    - question: Есть ли бесплатный пробный период? Как устроена оплата?
      answers:
        - И расширение, и приложение для iPhone, iPad и Mac предлагают бесплатный пробный период без привязки карты.
        - После пробного периода Pitch Changer Online предлагает недельную, годовую и разовую покупку, а Pitch Changer Offline — недельную и годовую подписку, как указано выше.
        - Все платежи безопасно обрабатываются через Paddle для расширения или через Apple для приложения.
    - question: Как отменить подписку?
      answers:
        - Нажмите кнопку Manage Subscription внутри приложения или расширения и следуйте подсказкам.
        - Процесс полностью автоматический, поэтому не нужно звонить или писать письма.
    - question: Для кого создан Pitch Changer?
      answers:
        - Pitch Changer создан для певцов, музыкантов, продюсеров, диджеев, преподавателей и всех, кому нужно менять тональность песен.
        - Если вы репетируете дома, выступаете вживую, занимаетесь со студентами или готовите материалы, он помогает быстро перевести музыку в тональность, которая подходит именно вам.
