offline:
  title: Pitch Changer Offline
  paragraphs:
    - Vom Üben bis zur Produktion hilft dir Pitch Changer dabei, Songs zu transponieren, Tonhöhen zu verschieben, die Tonart zu ändern und ganze Audio-Stapel präzise zu bearbeiten.
    - Mit Pitch Changer für iPhone, iPad und Mac importierst du Audiodateien, änderst die Tonhöhe ohne Tempowechsel und bearbeitest ganze Ordner, um Übetracks, Unterrichtsmaterial oder Produktionsdateien vorzubereiten.
  bullets:
    - Ändere die Tonhöhe von Audiodateien schnell und präzise.
    - Transponiere Musik nach oben oder unten, ohne das Tempo zu verändern.
    - Bearbeite mehrere Songs in einem Durchgang.
    - Funktioniert offline ohne aktive Internetverbindung.
    - Unterstützt gängige Formate wie MP3, WAV, FLAC und mehr.
  perfect_for_label: "Ideal für:"
  perfect_for_text: Producer, DJs, Lehrkräfte und Musikerinnen und Musiker, die mit lokalen Audiodateien arbeiten.
