overview:
  title: Was ist Pitch Changer?
  paragraphs:
    - Pitch Changer lässt dich Songs auf jeder Website in eine andere Tonart bringen und Musik auf deinem Computer transponieren, ohne komplizierte Audio-Software. Das Werkzeug ist für echte Alltagssituationen gedacht, etwa fürs Üben, Unterrichten, Aufnehmen oder einfach dafür, Lieblingssongs angenehmer zu hören.
    - "Mit Pitch Changer kannst du:"
  bullets:
    - Die Tonart eines Songs in Halbtonschritten nach oben oder unten ändern.
    - In einer Tonart üben, die besser zu Stimme oder Instrument passt.
    - Backing-Tracks, Karaoke-Versionen und Unterrichtsmaterial vorbereiten.
    - Arrangements, Harmonien und kreative Tonhöhenideen ausprobieren.
  versions_intro: "Pitch Changer gibt es in zwei Versionen:"
  online_link_label: Tonhöhenänderung
  online_link_suffix: als Erweiterung für Websites, und
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: als App für iPhone, iPad und Mac für die Arbeit mit Dateien.
online:
  title: Tonhöhenänderung
  paragraphs:
    - Nutze Tonhöhenänderung, um Songs während des Hörens schnell in eine andere Tonart zu bringen. So kannst du Musik direkt im Browser transponieren, ohne deinen Ablauf zu unterbrechen.
    - Pitch Changer Online legt die Tonhöhensteuerung direkt in deinen Browser. Ändere die Tonart auf YouTube und auf vielen anderen Audio-Websites mit wenigen Klicks.
  bullets:
    - Ändere die Tonart eines Songs online direkt auf jeder Website.
    - Funktioniert als Werkzeug zum Umstimmen auf YouTube und auf anderen Musikplattformen.
    - Passe die Tonhöhe in Halbtonschritten mit klaren Reglern an.
    - Sehr gut geeignet fürs Mitüben, für Karaoke oder fürs entspannte Hören in einer passenderen Tonart.
  perfect_for_label: "Ideal für:"
  perfect_for_text: Sängerinnen und Sänger, Vocal Coaches, Lehrkräfte, Schulen, Instrumentalistinnen und Instrumentalisten und alle, die mit Online-Videos üben.
  pricing_template: "Nach der kostenlosen Testphase: WEEKLY_PRICE, YEARLY_PRICE oder LIFETIME_PRICE."
