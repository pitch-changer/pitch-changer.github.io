use_cases:
  title: Wer nutzt Pitch Changer?
  items:
    - title: Vocal Coaches und Sänger
      body: Passe die Tonart eines Songs schnell an den Stimmumfang einer Person an. Lass Übungen in verschiedenen Tonarten laufen, probiere Alternativen aus und mache schwierige Songs angenehmer zu singen.
    - title: Instrumentalisten
      body: Gitarristen und andere Instrumentalistinnen und Instrumentalisten können Tracks in eine Tonart transponieren, die besser zum Instrument oder zur Stimmung passt, ohne neu aufzunehmen oder umzustimmen.
    - title: Producer und DJs
      body: Teste Ideen, Remixe und Übergänge, indem du Tonhöhe und Tonart in Sekunden verschiebst. Bereite Backing-Tracks, Stems und Skizzen für deine DAW oder dein Live-Set vor.
    - title: Lehrkräfte und Lernende
      body: Erstelle eigene Song-Versionen für Unterricht, Musiktheorie-Demos und konzentrierte Übeeinheiten.
reviews:
  title: Was unsere Nutzer sagen
  subtitle: Das berichten Menschen, die Pitch Changer ausprobiert haben
  items:
    - name: Grant Kimbell
      text: Ich kann wirklich empfehlen, eine zufällige Einstellung zu wählen, nur nicht zu extrem, und dann die Playlist laufen zu lassen. Es fühlt sich an, als würde man einen Song, den man liebt, zum ersten Mal wieder hören, nur mit ganz anderer Stimmung. Die Qualität der Tonhöhenänderung ist hervorragend.
    - name: Vadim Makarov
      text: Ich bin Vocal Coach und muss die Tonart von Songs oft für meine Schülerinnen und Schüler anpassen. Die Erweiterung funktioniert auf verschiedenen Websites, nicht nur auf YouTube, ohne Bugs oder Abstürze. Und sie ist sehr einfach, was ein riesiger Vorteil ist.
    - name: Nikola Negovanovic
      text: Nach mehreren Monaten Nutzung kann ich sagen, dass es die beste App für Tonhöhenänderungen in Chrome ist. Den Preis auf jeden Fall wert.
    - name: The Real Spiro Agnew
      text: Ausgezeichnet, funktioniert wie ein Traum.
    - name: Ice
      text: Genau das erwarte ich von einer guten Browser-Erweiterung.
    - name: maryam seddigh
      text: Es ist unglaublich. Ich habe so lange nach genau so etwas gesucht.
    - name: Hans Harding
      text: Großartiges Werkzeug für mich als Bassist, wenn ein Song in einer anderen Tonart gespielt werden muss.
    - name: Kieran Brown
      text: Da ist dieser eine YouTuber mit wirklich guten Videos, aber ich halte seine quäkige Oma-Stimme nicht aus. Damit ist es für die Ohren deutlich leichter.
    - name: lilly imaginator
      text: Für mich ist das eine absolute Pflicht-Erweiterung. Großartig für Karaoke, zum Musiklernen oder einfach, um auszuprobieren, wie Songs höher oder tiefer klingen.
faq:
  title: Häufig gestellte Fragen
  items:
    - question: Was ist der Unterschied zwischen Pitch Changer Online und Pitch Changer Offline?
      answers:
        - Pitch Changer Online ist eine Browser-Erweiterung, die die Tonart von Songs direkt auf Websites wie YouTube und anderen Audio- oder Video-Plattformen ändert.
        - Pitch Changer Offline ist eine eigenständige App für iPhone, iPad und Mac, die offline mit deinen Audiodateien arbeitet und mehrere Tracks gleichzeitig verarbeiten kann.
    - question: Brauche ich eine Internetverbindung für Pitch Changer?
      answers:
        - Die Pitch-Changer-Erweiterung läuft im Browser und ist für Online-Inhalte gedacht, deshalb nutzt du sie normalerweise mit Internetverbindung.
        - Die App für iPhone, iPad und Mac arbeitet vollständig offline mit lokalen Audiodateien, daher kannst du sie nach der Installation auch ohne aktive Verbindung nutzen.
    - question: Welche Audioformate unterstützt Pitch Changer Offline?
      answers:
        - Die App für iPhone, iPad und Mac unterstützt gängige Formate wie MP3, WAV, FLAC und mehr, sodass du mit den Dateien arbeiten kannst, die du bereits hast, ohne sie vorher umzuwandeln.
        - Du kannst auch Videos, Regionen aus deiner DAW und ganze Ordner hinzufügen. Pitch Changer extrahiert das Audio für dich.
    - question: Beeinflusst eine Tonhöhenänderung die Audioqualität?
      answers:
        - Pitch Changer ist darauf ausgelegt, die Audioqualität zu bewahren, während du die Tonart änderst. Nutzer sagen regelmäßig, dass die Qualität der Tonhöhenänderung ausgezeichnet ist.
        - Wie bei jeder digitalen Bearbeitung können sehr extreme Änderungen weniger natürlich klingen, aber in den meisten Fällen bleibt das Ergebnis sauber und musikalisch.
    - question: Ich finde keine Instrumentalversionen von Songs. Könnt ihr helfen?
      answers: []
      answer_html: Schau dir unseren <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a> an. Er entfernt Gesang online oder offline aus einem Song und passt sehr gut zu Pitch Changer.
    - question: Wie kann ich das Tempo eines Songs ändern?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Wenn du Musik auf einer Website langsamer oder schneller machen willst, während sie schon läuft, nutze TOOL_LINK.
        - tool_key: speed_tool
          template: Wenn du das Tempo deiner eigenen Datei ändern möchtest und die Tonhöhe stabil bleiben soll, nutze TOOL_LINK.
    - question: Gibt es eine kostenlose Testphase? Wie funktioniert der Preis?
      answers:
        - Sowohl die Erweiterung als auch die App für iPhone, iPad und Mac enthalten eine kostenlose Testphase ohne Karte.
        - Nach der Testphase bietet Pitch Changer Online wöchentliche, jährliche und einmalige Kaufoptionen, während Pitch Changer Offline wöchentliche und jährliche Abos anbietet, wie oben aufgeführt.
        - Alle Zahlungen werden für die Erweiterung sicher über Paddle oder für die App über Apple abgewickelt.
    - question: Wie kündige ich mein Abo?
      answers:
        - Klicke in der App oder Erweiterung auf die Schaltfläche Manage Subscription und folge dort den Schritten.
        - Der Ablauf ist vollständig automatisch, deshalb musst du nicht anrufen oder E-Mails schreiben.
    - question: Für wen ist Pitch Changer gedacht?
      answers:
        - Pitch Changer ist für Sängerinnen und Sänger, Musikerinnen und Musiker, Producer, DJs, Lehrkräfte und alle gedacht, die die Tonart von Songs anpassen müssen.
        - Ob du zu Hause übst, live spielst, unterrichtest oder Material vorbereitest, du kommst damit schnell in die Tonart, die für dich funktioniert.
