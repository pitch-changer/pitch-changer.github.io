use_cases:
  title: Kto używa Pitch Changer?
  items:
    - title: Nauczyciele śpiewu i wokaliści
      body: Szybko dopasuj tonację dowolnego utworu do skali głosu ucznia. Ćwicz w różnych tonacjach, sprawdzaj inne rozwiązania i sprawiaj, że trudne utwory śpiewa się wygodniej.
    - title: Instrumentaliści
      body: Gitarzyści i inni instrumentaliści mogą transponować ścieżki do tonacji najlepiej pasującej do instrumentu lub stroju bez ponownego nagrywania czy strojenia.
    - title: Producenci i DJ-e
      body: Testuj pomysły, remiksy i przejścia, przesuwając wysokość i tonację w kilka sekund. Przygotowuj podkłady, stemsy i szkice do DAW albo setów na żywo.
    - title: Nauczyciele i uczniowie
      body: Twórz własne wersje utworów do lekcji, pokazów z teorii muzyki i bardziej skupionych sesji ćwiczeniowych.
reviews:
  title: Co mówią użytkownicy
  subtitle: Oto opinie osób, którym spodobał się Pitch Changer
  items:
    - name: Grant Kimbell
      text: Naprawdę polecam wybrać losowe ustawienie, byle nie za ekstremalne, i puścić playlistę w losowej kolejności. To jak słyszeć ukochany utwór pierwszy raz, tylko w zupełnie innym klimacie. Jakość zmiany wysokości jest znakomita.
    - name: Vadim Makarov
      text: Jestem nauczycielem śpiewu i często muszę dostosowywać tonację utworów dla uczniów. To rozszerzenie działa perfekcyjnie na różnych stronach, nie tylko na YouTube, bez błędów i awarii. Jest też bardzo proste, a to ogromna zaleta.
    - name: Nikola Negovanovic
      text: Po kilku miesiącach używania mogę potwierdzić, że to najlepsza aplikacja do zmiany tonacji w Chrome. Zdecydowanie warta swojej ceny.
    - name: The Real Spiro Agnew
      text: Znakomite, działa jak marzenie.
    - name: Ice
      text: Dokładnie tego oczekuję od dobrego rozszerzenia do przeglądarki.
    - name: maryam seddigh
      text: To niesamowite. Szukałam czegoś takiego od dawna.
    - name: Hans Harding
      text: Świetne narzędzie dla mnie jako basisty, gdy utwór trzeba zagrać w nowej tonacji.
    - name: Kieran Brown
      text: Jest taki jeden youtuber, który robi naprawdę dobre filmy, ale nie znoszę jego piskliwego głosu. Dzięki temu słucha się go o wiele łatwiej.
    - name: lilly imaginator
      text: Moim zdaniem to rozszerzenie z kategorii must-have. Świetne do karaoke, nauki muzyki albo po prostu zabawy tym, jak utwory brzmią wyżej lub niżej.
faq:
  title: Najczęściej zadawane pytania
  items:
    - question: Jaka jest różnica między Pitch Changer Online a Pitch Changer Offline?
      answers:
        - Pitch Changer Online to rozszerzenie przeglądarki, które zmienia tonację utworów bezpośrednio na stronach takich jak YouTube i innych platformach audio lub wideo.
        - Pitch Changer Offline to samodzielna aplikacja na iPhone'a, iPada i Maca, działająca offline z własnymi plikami audio i potrafiąca wsadowo przetwarzać wiele ścieżek naraz.
    - question: Czy potrzebuję internetu, żeby korzystać z Pitch Changer?
      answers:
        - Rozszerzenie Pitch Changer działa w przeglądarce i jest przeznaczone do treści online, więc zwykle używasz go, gdy masz połączenie z internetem.
        - Aplikacja na iPhone'a, iPada i Maca działa całkowicie offline z lokalnymi plikami audio, więc po instalacji możesz używać jej bez aktywnego połączenia.
    - question: Jakie formaty audio obsługuje Pitch Changer Offline?
      answers:
        - Aplikacja na iPhone'a, iPada i Maca działa z popularnymi formatami audio, takimi jak MP3, WAV, FLAC i inne, więc możesz od razu przetwarzać pliki, które już masz, bez wcześniejszej konwersji.
        - Możesz też dodawać wideo, regiony z DAW i całe foldery. Pitch Changer sam wyodrębni z nich audio.
    - question: Czy zmiana wysokości wpływa na jakość dźwięku?
      answers:
        - Pitch Changer został zaprojektowany tak, aby zachowywać jakość dźwięku podczas zmiany tonacji. Użytkownicy regularnie piszą, że jakość zmiany wysokości jest świetna.
        - Jak przy każdej cyfrowej zmianie wysokości, bardzo skrajne ustawienia mogą brzmieć mniej naturalnie, ale w większości przypadków rezultat pozostaje czysty i muzyczny.
    - question: Nie mogę znaleźć instrumentalnych wersji utworów. Możecie pomóc?
      answers: []
      answer_html: Sprawdź nasz <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>. Usuwa wokal z utworu online albo offline i świetnie współpracuje z Pitch Changer.
    - question: Jak mogę zmienić tempo utworu?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Jeśli chcesz spowolnić albo przyspieszyć muzykę na stronie, kiedy już gra, użyj TOOL_LINK.
        - tool_key: speed_tool
          template: Jeśli chcesz zmienić tempo własnego pliku, zachowując tę samą wysokość, użyj TOOL_LINK.
    - question: Czy jest darmowy okres próbny? Jak działają ceny?
      answers:
        - Zarówno rozszerzenie, jak i aplikacja na iPhone'a, iPada i Maca mają darmowy okres próbny bez karty.
        - Po okresie próbnym Pitch Changer Online oferuje opcje tygodniowe, roczne i zakup jednorazowy, a Pitch Changer Offline subskrypcje tygodniowe i roczne, jak podano wyżej.
        - Wszystkie płatności są bezpiecznie obsługiwane przez Paddle w przypadku rozszerzenia albo Apple w przypadku aplikacji.
    - question: Jak anulować subskrypcję?
      answers:
        - Kliknij przycisk Manage Subscription w aplikacji albo rozszerzeniu i postępuj zgodnie z instrukcjami.
        - Proces jest w pełni automatyczny, więc nie trzeba dzwonić ani pisać maili.
    - question: Dla kogo jest Pitch Changer?
      answers:
        - Pitch Changer jest stworzony dla wokalistów, muzyków, producentów, DJ-ów, nauczycieli i wszystkich, którzy muszą dopasowywać tonację utworów.
        - Niezależnie od tego, czy ćwiczysz w domu, grasz na żywo, uczysz uczniów czy przygotowujesz materiały, daje szybki sposób na przeniesienie muzyki do tonacji odpowiedniej dla ciebie.
