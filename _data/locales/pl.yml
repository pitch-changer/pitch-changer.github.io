  title: Pitch Changer Offline
  paragraphs:
    - Od ćwiczeń po produkcję, Pitch Changer pomaga transponować, przesuwać wysokość, zmieniać tonację utworów i wsadowo przetwarzać audio z dużą precyzją.
    - Z Pitch Changer na iPhone'a, iPada i Maca możesz importować pliki audio, zmieniać wysokość bez zmiany prędkości i przetwarzać całe foldery, by przygotować ścieżki do ćwiczeń, materiały do lekcji albo profesjonalne projekty.
  bullets:
    - Zmieniaj wysokość plików audio szybko i dokładnie.
    - Transponuj muzykę w górę lub w dół bez zmiany tempa.
    - Przetwarzaj wiele utworów w jednym przebiegu.
    - Działa offline bez aktywnego połączenia z internetem.
