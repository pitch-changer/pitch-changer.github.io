overview:
  title: Czym jest Pitch Changer?
  paragraphs:
    - "Pitch Changer pozwala zmieniać tonację utworów na dowolnej stronie oraz transponować muzykę na komputerze bez skomplikowanego oprogramowania audio. To narzędzie stworzone do prawdziwych sytuacji: ćwiczeń, nauczania, nagrań albo po prostu słuchania ulubionych utworów w wygodniejszej tonacji."
    - "Możesz:"
  bullets:
    - Zmieniać tonację utworu w górę lub w dół o półtony.
    - Ćwiczyć w tonacji lepiej pasującej do głosu lub instrumentu.
    - Przygotowywać podkłady, wersje karaoke i materiały do lekcji.
    - Eksperymentować z aranżacjami, harmoniami i kreatywnymi zmianami wysokości.
  versions_intro: "Pitch Changer jest dostępny w dwóch wersjach:"
  online_link_label: Zmieniacz tonacji
  online_link_suffix: rozszerzenie przeglądarki do stron, a
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: aplikacja na iPhone'a, iPada i Maca do pracy z plikami.
online:
  title: Zmieniacz tonacji
  paragraphs:
    - Używaj Zmieniacza tonacji, aby łatwo zmieniać tonację utworów już podczas odtwarzania. To wygodny sposób na transponowanie muzyki bez wychodzenia z przeglądarki.
    - Pitch Changer Online dodaje sterowanie tonacją bezpośrednio do przeglądarki. Zmieniaj tonację na YouTube i wielu innych stronach audio w zaledwie kilka kliknięć.
  bullets:
    - Zmieniaj tonację utworu online bezpośrednio na dowolnej stronie.
    - Działa jako narzędzie do zmiany tonacji na YouTube i innych platformach muzycznych.
    - Reguluj wysokość co półtonu za pomocą czytelnych kontrolek.
    - Świetne do wspólnego grania, karaoke lub słuchania w wygodniejszej tonacji.
  perfect_for_label: "Idealne dla:"
  perfect_for_text: wokalistów, nauczycieli śpiewu, nauczycieli, szkół, instrumentalistów i wszystkich, którzy ćwiczą z filmami online.
