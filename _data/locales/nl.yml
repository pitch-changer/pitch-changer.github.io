overview:
  title: Wat is Pitch Changer?
  paragraphs:
    - Met Pitch Changer kun je op elke website de toonsoort van nummers veranderen en muziek op je computer transponeren zonder ingewikkelde audiosoftware. Het is gemaakt voor echte situaties zoals oefenen, lesgeven, opnemen of gewoon genieten van je favoriete nummers in een comfortabelere toonsoort.
    - "Met Pitch Changer kun je:"
  bullets:
    - De toonsoort van een nummer omhoog of omlaag zetten per halve toon.
    - Oefenen in een toonsoort die beter past bij je stem of instrument.
    - Backingtracks, karaokeversies en lesmateriaal voorbereiden.
    - Experimenteren met arrangementen, harmonieën en creatieve pitchverschuivingen.
  versions_intro: "Pitch Changer is beschikbaar in twee versies:"
  online_link_label: Toonhoogte veranderen
  online_link_suffix: een browserextensie voor websites, en
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: een iPhone-, iPad- en Mac-app voor bestanden.
