use_cases:
  title: Wie gebruikt Pitch Changer?
  items:
    - title: Zangcoaches en zangers
      body: Pas de toonsoort van elk nummer snel aan de stemomvang van een leerling aan. Oefen in verschillende toonsoorten, probeer alternatieven uit en maak lastige nummers comfortabeler om te zingen.
    - title: Instrumentalisten
      body: Gitaristen en andere instrumentalisten kunnen tracks transponeren naar de toonsoort die het beste past bij hun instrument of stemming, zonder opnieuw op te nemen of opnieuw te stemmen.
    - title: Producers en dj's
      body: Test ideeën, remixes en overgangen door pitch en toonsoort in seconden te verschuiven. Bereid backingtracks, stems en schetsen voor je DAW of liveset voor.
    - title: Docenten en leerlingen
      body: Maak aangepaste versies van nummers voor lessen, muziektheorie-demo's en gerichte oefensessies.
reviews:
  title: Wat onze gebruikers zeggen
  subtitle: Zo klinkt het van mensen die Pitch Changer hebben geprobeerd
  items:
    - name: Grant Kimbell
      text: Ik kan echt aanraden om een willekeurige instelling te kiezen, niet te extreem, en je playlist op shuffle te zetten. Het voelt alsof je een nummer waar je van houdt voor het eerst opnieuw hoort, maar dan met een heel andere vibe. De kwaliteit van de pitchverschuiving is uitstekend.
    - name: Vadim Makarov
      text: Ik ben zangcoach en moet vaak de toonsoort van nummers aanpassen voor leerlingen. De extensie werkt perfect op verschillende websites, niet alleen op YouTube, zonder bugs of crashes. Bovendien is hij heel eenvoudig, en dat is een groot voordeel.
    - name: Nikola Negovanovic
      text: Na meerdere maanden gebruik kan ik bevestigen dat dit de beste pitch changer-app voor Chrome is. Absoluut het geld waard.
    - name: The Real Spiro Agnew
      text: Uitstekend, werkt als een droom.
    - name: Ice
      text: Dit is precies wat ik verwacht van een goede browserextensie.
    - name: maryam seddigh
      text: Het is geweldig. Ik heb hier heel lang naar gezocht.
    - name: Hans Harding
      text: Geweldig hulpmiddel voor mij als bassist wanneer een nummer in een andere toonsoort gespeeld moet worden.
    - name: Kieran Brown
      text: Er is een YouTuber die echt goede video's maakt, maar ik trek zijn piepstem niet. Hiermee is het een stuk prettiger om naar te luisteren.
    - name: lilly imaginator
      text: Wat mij betreft is dit een onmisbare extensie. Geweldig voor karaoke, muziek leren of gewoon spelen met hoe nummers hoger of lager klinken.
faq:
  title: Veelgestelde vragen
  items:
    - question: Wat is het verschil tussen Pitch Changer Online en Pitch Changer Offline?
      answers:
        - Pitch Changer Online is een browserextensie die de toonsoort van nummers direct verandert op websites zoals YouTube en andere audio- of videoplatforms.
        - Pitch Changer Offline is een zelfstandige iPhone-, iPad- en Mac-app die offline werkt met je eigen audiobestanden en meerdere tracks tegelijk kan batchverwerken.
    - question: Heb ik een internetverbinding nodig om Pitch Changer te gebruiken?
      answers:
        - De Pitch Changer-extensie draait in je browser en is bedoeld voor online content, dus meestal gebruik je die terwijl je verbonden bent met internet.
        - De iPhone-, iPad- en Mac-app werkt volledig offline met lokale audiobestanden, dus na installatie kun je hem zonder actieve verbinding gebruiken.
    - question: Welke audioformaten ondersteunt Pitch Changer Offline?
      answers:
        - De iPhone-, iPad- en Mac-app werkt met gangbare audioformaten zoals MP3, WAV, FLAC en meer, zodat je bestanden die je al hebt direct kunt verwerken zonder eerst te converteren.
        - Je kunt ook video's, regio's uit je DAW en complete mappen toevoegen. Pitch Changer haalt de audio er voor je uit.
    - question: Heeft het veranderen van pitch invloed op de audiokwaliteit?
      answers:
        - Pitch Changer is ontworpen om de audiokwaliteit te behouden terwijl je de toonsoort aanpast. Gebruikers zeggen regelmatig dat de kwaliteit van de pitchverschuiving uitstekend is.
        - Zoals bij elke digitale pitchbewerking kunnen heel extreme instellingen minder natuurlijk klinken, maar in de meeste gevallen blijft het resultaat schoon en muzikaal.
    - question: Ik kan geen instrumentale versies van nummers vinden. Kunnen jullie helpen?
      answers: []
      answer_html: Probeer onze <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>. Daarmee verwijder je zang online of offline uit een nummer en hij werkt prachtig samen met Pitch Changer.
    - question: Hoe kan ik het tempo van een nummer veranderen?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Als je muziek op een website wilt vertragen of versnellen terwijl die al speelt, gebruik dan TOOL_LINK.
        - tool_key: speed_tool
          template: Als je het tempo van je eigen bestand wilt veranderen terwijl de toonhoogte gelijk blijft, gebruik dan TOOL_LINK.
    - question: Is er een gratis proefperiode? Hoe werkt de prijs?
      answers:
        - Zowel de extensie als de iPhone-, iPad- en Mac-app hebben een gratis proefperiode waarvoor geen kaart nodig is.
        - Na de proefperiode biedt Pitch Changer Online wekelijkse, jaarlijkse en eenmalige aankoopopties, en Pitch Changer Offline wekelijkse en jaarlijkse abonnementen, zoals hierboven vermeld.
        - Alle betalingen worden veilig verwerkt via Paddle voor de extensie of Apple voor de app.
    - question: Hoe zeg ik mijn abonnement op?
      answers:
        - Klik op de knop Manage Subscription in de app of extensie en volg daar de instructies.
        - Het proces verloopt volledig automatisch, dus je hoeft niet te bellen of e-mails te schrijven.
    - question: Voor wie is Pitch Changer bedoeld?
      answers:
        - Pitch Changer is gemaakt voor zangers, muzikanten, producers, dj's, docenten en iedereen die de toonsoort van nummers moet aanpassen.
        - Of je nu thuis oefent, live speelt, lesgeeft of materiaal voorbereidt, het helpt je snel om muziek in de toonsoort te krijgen die voor jou werkt.
