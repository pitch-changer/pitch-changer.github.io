  image_alt: Installer Pitch Changer-utvidelsen og legg den til i nettleseren på noen sekunder.
offline:
  title: Pitch Changer Offline
  paragraphs:
    - Fra øving til produksjon hjelper Pitch Changer deg med å transponere, flytte pitch, endre toneart på sanger og batchbehandle lyd med presisjon.
    - Med Pitch Changer for iPhone, iPad og Mac kan du importere lydfiler, endre pitch uten å endre hastighet og behandle hele mapper for å klargjøre øvingsspor, undervisningsmateriale eller profesjonelle prosjekter.
  bullets:
    - Endre pitch på lydfiler raskt og nøyaktig.
    - Transponer musikk opp eller ned uten å endre tempo.
    - Behandle flere sanger i én omgang.
    - Fungerer offline uten aktiv internettforbindelse.
    - Støtter vanlige formater som MP3, WAV, FLAC og flere.
  perfect_for_label: "Perfekt for:"
  perfect_for_text: produsenter, DJ-er, lærere og musikere som arbeider med lokale lydfiler.
  pricing_template: "Etter gratisperioden: WEEKLY_PRICE eller YEARLY_PRICE."
  offer_templates:
