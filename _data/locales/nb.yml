overview:
  title: Hva er Pitch Changer?
  paragraphs:
    - Med Pitch Changer kan du endre toneart på sanger på hvilken som helst nettside og transponere musikk på datamaskinen uten komplisert lydprogramvare. Det er laget for reelle behov som øving, undervisning, opptak eller bare det å høre favorittlåtene dine i en mer behagelig toneart.
    - "Du kan:"
  bullets:
    - Endre tonearten på en sang opp eller ned i halvtoner.
    - Øve i en toneart som passer stemmen eller instrumentet bedre.
    - Forberede backing tracks, karaokeversjoner og undervisningsmateriell.
    - Utforske arrangementer, harmonier og kreative pitchskift.
  versions_intro: "Pitch Changer finnes i to versjoner:"
  online_link_label: Transponera musik
  online_link_suffix: en nettleserutvidelse for nettsider, og
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: en iPhone-, iPad- og Mac-app for filer.
online:
  title: Transponera musik
  paragraphs:
    - Bruk Transponera musik for å endre toneart på sanger mens de allerede spiller. Det er en enkel måte å transponere musikk på uten å forlate nettleseren.
    - Pitch Changer Online legger toneartskontroller rett inn i nettleseren. Endre toneart på YouTube og mange andre lydnettsider med bare noen få klikk.
  bullets:
    - Endre tonearten på en sang på nett direkte på hvilken som helst nettside.
    - Fungerer som verktøy for toneartsendring på YouTube og andre musikkplattformer.
    - Juster pitch i halvtoner med tydelige kontroller.
    - Passer godt til samspill, karaoke eller lytting i en mer komfortabel toneart.
  perfect_for_label: "Perfekt for:"
  perfect_for_text: sangere, vokalpedagoger, lærere, skoler, instrumentalister og alle som øver med videoer på nett.
  pricing_template: "Etter gratisperioden: WEEKLY_PRICE, YEARLY_PRICE eller LIFETIME_PRICE."
  offer_templates:
