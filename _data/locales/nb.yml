use_cases:
  title: Hvem bruker Pitch Changer?
  items:
    - title: Vokalpedagoger og sangere
      body: Juster raskt tonearten på hvilken som helst sang til elevens stemmeleie. Kjør øvelser i ulike tonearter, prøv alternativer og gjør krevende sanger mer behagelige å synge.
    - title: Instrumentalister
      body: Gitarister og andre instrumentalister kan transponere spor til tonearten som passer best til instrumentet eller stemmingen uten å spille inn eller stemme om på nytt.
    - title: Produsenter og DJ-er
      body: Test ideer, remikser og overganger ved å flytte pitch og toneart på sekunder. Forbered backing tracks, stems og skisser til DAW eller livesett.
    - title: Lærere og elever
      body: Lag egne versjoner av sanger til timer, musikkteori-demonstrasjoner og mer fokuserte økter.
reviews:
  title: Hva brukerne våre sier
  subtitle: Hør fra folk som har prøvd og likt Pitch Changer
  items:
    - name: Grant Kimbell
      text: Jeg kan virkelig anbefale å velge en tilfeldig innstilling, bare ikke for ekstrem, og sette spillelisten på shuffle. Det føles som å høre en sang du elsker for første gang igjen, bare med en helt annen stemning. Kvaliteten på pitchskiftet er utmerket.
    - name: Vadim Makarov
      text: Jeg er vokalpedagog og trenger ofte å justere tonearten på sanger for elever. Utvidelsen fungerer perfekt på ulike nettsider, ikke bare YouTube, uten feil eller krasj. Den er også veldig enkel, og det er en stor fordel.
    - name: Nikola Negovanovic
      text: Etter flere måneders bruk kan jeg bekrefte at dette er den beste pitch changer-appen for Chrome. Absolutt verdt prisen.
    - name: The Real Spiro Agnew
      text: Suverent, fungerer som en drøm.
    - name: Ice
      text: Dette er akkurat det jeg forventer av en god nettleserutvidelse.
    - name: maryam seddigh
      text: Den er fantastisk. Jeg har lett etter dette lenge.
    - name: Hans Harding
      text: Et supert verktøy for meg som bassist når en sang må spilles i en ny toneart.
    - name: Kieran Brown
      text: Det finnes en YouTuber som lager veldig gode videoer, men jeg tåler ikke den sutrete stemmen hans. Dette gjør det mye lettere å høre på.
    - name: lilly imaginator
      text: Etter min mening er dette en utvidelse man bare må ha. Flott til karaoke, musikklæring eller bare å leke med hvordan sanger høres ut i lysere eller mørkere leie.
faq:
  title: Ofte stilte spørsmål
  items:
    - question: Hva er forskjellen mellom Pitch Changer Online og Pitch Changer Offline?
      answers:
        - Pitch Changer Online er en nettleserutvidelse som endrer tonearten på sanger direkte på nettsider som YouTube og andre lyd- eller videoplattformer.
        - Pitch Changer Offline er en frittstående app for iPhone, iPad og Mac som fungerer offline med egne lydfiler og kan batchbehandle flere spor samtidig.
    - question: Trenger jeg internettforbindelse for å bruke Pitch Changer?
      answers:
        - Pitch Changer-utvidelsen kjører i nettleseren og er laget for innhold på nett, så du bruker den vanligvis mens du er koblet til internett.
        - Appen for iPhone, iPad og Mac fungerer helt offline med lokale lydfiler, så når den først er installert kan du bruke den uten aktiv tilkobling.
    - question: Hvilke lydformater støtter Pitch Changer Offline?
      answers:
        - Appen for iPhone, iPad og Mac fungerer med vanlige lydformater som MP3, WAV, FLAC og flere, så du kan behandle filer du allerede har uten å konvertere dem først.
        - Du kan også legge til videoer, regioner fra DAW-en din og hele mapper. Pitch Changer trekker ut lyden for deg.
    - question: Påvirker det lydkvaliteten å endre pitch?
      answers:
        - Pitch Changer er laget for å bevare lydkvaliteten mens du justerer tonearten. Brukerne våre sier ofte at kvaliteten på pitchskiftet er svært god.
        - Som med all digital pitchbehandling kan veldig ekstreme endringer låte mindre naturlig, men i de fleste tilfeller holder resultatet seg rent og musikalsk.
    - question: Jeg finner ikke instrumentalversjoner av sanger. Kan dere hjelpe?
      answers: []
      answer_html: Ta en titt på vår <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>. Den fjerner vokal fra en sang på nett eller offline og passer veldig godt sammen med Pitch Changer.
    - question: Hvordan kan jeg endre tempoet på en sang?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Hvis du vil gjøre musikk på en nettside langsommere eller raskere mens den allerede spiller, bruk TOOL_LINK.
        - tool_key: speed_tool
          template: Hvis du vil endre tempoet på din egen fil og beholde pitch, bruk TOOL_LINK.
    - question: Finnes det en gratis prøveperiode? Hvordan fungerer prisene?
      answers:
        - Både utvidelsen og appen for iPhone, iPad og Mac har en gratis prøveperiode uten kort.
        - Etter prøveperioden tilbyr Pitch Changer Online ukentlige, årlige og engangskjøp, mens Pitch Changer Offline tilbyr ukentlige og årlige abonnementer, som vist over.
        - Alle betalinger håndteres trygt via Paddle for utvidelsen eller Apple for appen.
    - question: Hvordan sier jeg opp abonnementet mitt?
      answers:
        - Klikk på knappen Manage Subscription i appen eller utvidelsen og følg stegene der.
        - Prosessen er helt automatisk, så du trenger ikke å ringe eller sende e-post.
    - question: Hvem er Pitch Changer laget for?
      answers:
        - Pitch Changer er laget for sangere, musikere, produsenter, DJ-er, lærere og alle som trenger å justere tonearten på sanger.
        - Enten du øver hjemme, spiller live, underviser elever eller forbereder materiale, gir det deg en rask måte å få musikken over i tonearten som passer for deg.
