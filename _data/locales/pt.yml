overview:
  title: O que é o Pitch Changer?
  paragraphs:
    - O Pitch Changer permite mudar a tonalidade das músicas em qualquer site e transpor música no computador sem software de áudio complicado. Ele foi feito para situações reais como estudo, ensino, gravação ou simplesmente para curtir suas músicas favoritas em uma tonalidade mais confortável.
    - "Com o Pitch Changer você pode:"
  bullets:
    - Mudar a tonalidade de uma música para cima ou para baixo em semitons.
    - Estudar em uma tonalidade que combine melhor com sua voz ou instrumento.
    - Preparar backing tracks, versões de karaokê e material de aula.
    - Experimentar arranjos, harmonias e mudanças criativas de pitch.
  versions_intro: "O Pitch Changer está disponível em duas versões:"
  online_link_label: Mudador de Pitch
  online_link_suffix: uma extensão de navegador para sites, e
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: um app para iPhone, iPad e Mac voltado para arquivos.
online:
  title: Mudador de Pitch
  paragraphs:
    - Use o Mudador de Pitch para mudar a tonalidade das músicas com facilidade enquanto elas já estão tocando. É um jeito prático de transpor música sem sair do navegador.
    - O Pitch Changer Online adiciona o controle de tonalidade direto no navegador. Ajuste a tonalidade no YouTube e em muitos outros sites de áudio com apenas alguns cliques.
  bullets:
    - Mude a tonalidade das músicas online diretamente em qualquer site.
    - Funciona como ferramenta para mudar tonalidade no YouTube e em outras plataformas musicais.
    - Ajuste o pitch em semitons com controles claros.
    - Ótimo para tocar junto, fazer karaokê ou ouvir em uma tonalidade mais confortável.
  perfect_for_label: "Perfeito para:"
  perfect_for_text: cantores, professores de canto, docentes, escolas, instrumentistas e qualquer pessoa que pratique com vídeos online.
  pricing_template: "Depois do teste grátis: WEEKLY_PRICE, YEARLY_PRICE ou LIFETIME_PRICE."
  offer_templates:
    weekly: "PRICE_VALUE $ por semana"
    yearly: "PRICE_VALUE $ por ano"
    lifetime: "pagamento único de PRICE_VALUE $"
  cta: Adicionar Mudador de Pitch ao navegador
  image_alt: Instale a extensão Pitch Changer e adicione ao navegador em segundos.
offline:
  title: Pitch Changer Offline
  paragraphs:
    - Do estudo à produção, o Pitch Changer ajuda você a transpor, mudar o pitch, alterar a tonalidade das músicas e processar áudio em lote com precisão.
    - Com o Pitch Changer para iPhone, iPad e Mac, você importa arquivos de áudio, muda o pitch sem mexer na velocidade e processa pastas inteiras para preparar faixas de estudo, material de aula ou projetos profissionais.
  bullets:
    - Mude o pitch de arquivos de áudio com rapidez e precisão.
    - Transponha músicas para cima ou para baixo sem alterar o tempo.
    - Processe várias músicas de uma só vez.
    - Funciona offline sem conexão ativa com a internet.
    - Suporta formatos comuns como MP3, WAV, FLAC e outros.
  perfect_for_label: "Perfeito para:"
  perfect_for_text: produtores, DJs, professores e músicos que trabalham com arquivos de áudio locais.
  pricing_template: "Depois do teste grátis: WEEKLY_PRICE ou YEARLY_PRICE."
  offer_templates:
    weekly: "PRICE_VALUE $ por semana"
    yearly: "PRICE_VALUE $ por ano"
  cta: Adicionar Pitch Changer ao iPhone, iPad ou Mac
  image_alt: Baixe o Pitch Changer para iPhone, iPad ou Mac e mantenha seus projetos na tonalidade certa.
use_cases:
  title: Quem usa o Pitch Changer?
  items:
    - title: Professores de canto e cantores
      body: Ajuste rapidamente a tonalidade de qualquer música para combinar com a extensão vocal de um aluno. Faça exercícios em tonalidades diferentes, teste alternativas e deixe músicas difíceis mais confortáveis de cantar.
    - title: Instrumentistas
      body: Guitarristas e outros instrumentistas podem transpor faixas para a tonalidade que melhor combina com o instrumento ou com a afinação, sem regravar nem retunar.
    - title: Produtores e DJs
      body: Teste ideias, remixes e transições mudando pitch e tonalidade em segundos. Prepare backing tracks, stems e rascunhos para a sua DAW ou para sets ao vivo.
    - title: Professores e alunos
      body: Crie versões personalizadas de músicas para aulas, demonstrações de teoria musical e sessões de prática mais focadas.
reviews:
  title: O que nossos usuários dizem
  subtitle: Ouça quem já testou e gostou do Pitch Changer
  items:
    - name: Grant Kimbell
      text: Eu realmente recomendo escolher uma configuração aleatória, só que não muito extrema, e embaralhar a playlist. Parece que você está ouvindo uma música que ama pela primeira vez de novo, só que com outra vibe. A qualidade da mudança de pitch é excelente.
    - name: Vadim Makarov
      text: Sou professor de canto e muitas vezes preciso ajustar a tonalidade das músicas para alunos. A extensão funciona perfeitamente em vários sites, não só no YouTube, sem bugs nem travamentos. E também é muito simples, o que é uma grande vantagem.
    - name: Nikola Negovanovic
      text: Depois de vários meses usando, posso confirmar que este é o melhor app de mudança de pitch para Chrome. Vale muito a pena.
    - name: The Real Spiro Agnew
      text: Excelente, funciona como um sonho.
    - name: Ice
      text: É exatamente o que espero de uma boa extensão de navegador.
    - name: maryam seddigh
      text: É incrível. Eu procurava por isso há muito tempo.
    - name: Hans Harding
      text: Ótima ferramenta para mim como baixista quando uma música precisa ser tocada em outra tonalidade.
    - name: Kieran Brown
      text: Tem um youtuber que faz vídeos muito bons, mas eu não aguento aquela voz chorosa dele. Com isso fica muito mais fácil ouvir.
    - name: lilly imaginator
      text: Na minha opinião, é uma extensão obrigatória. Ótima para karaokê, aprendizado musical ou só para brincar com como as músicas soam mais altas ou mais baixas.
faq:
  title: Perguntas frequentes
  items:
    - question: Qual é a diferença entre Pitch Changer Online e Pitch Changer Offline?
      answers:
        - O Pitch Changer Online é uma extensão de navegador que muda a tonalidade das músicas diretamente em sites como YouTube e outras plataformas de áudio ou vídeo.
        - O Pitch Changer Offline é um app independente para iPhone, iPad e Mac que funciona offline com seus próprios arquivos de áudio e consegue processar várias faixas em lote.
    - question: Preciso de internet para usar o Pitch Changer?
      answers:
        - A extensão Pitch Changer roda no navegador e foi feita para conteúdo online, então normalmente você vai usá-la enquanto estiver conectado à internet.
        - O app para iPhone, iPad e Mac funciona totalmente offline com arquivos de áudio locais, então depois de instalado você pode usá-lo sem conexão ativa.
    - question: Quais formatos de áudio o Pitch Changer Offline suporta?
      answers:
        - O app para iPhone, iPad e Mac funciona com formatos de áudio comuns como MP3, WAV, FLAC e outros, então você pode processar os arquivos que já tem sem converter antes.
        - Você também pode adicionar vídeos, regiões da sua DAW e pastas inteiras. O Pitch Changer extrai o áudio para você.
    - question: Mudar o pitch afeta a qualidade do áudio?
      answers:
        - O Pitch Changer foi projetado para preservar a qualidade do áudio enquanto você ajusta a tonalidade. Nossos usuários dizem com frequência que a qualidade da mudança de pitch é excelente.
        - Como em qualquer processamento digital de pitch, mudanças muito extremas podem soar menos naturais, mas na maioria dos casos o resultado continua limpo e musical.
    - question: Não encontro versões instrumentais das músicas. Vocês podem ajudar?
      answers: []
      answer_html: Confira o nosso <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>. Ele remove o vocal de uma música online ou offline e funciona muito bem com o Pitch Changer.
    - question: Como posso mudar o tempo de uma música?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Se você quer desacelerar ou acelerar a música em um site enquanto ela já está tocando, use TOOL_LINK.
        - tool_key: speed_tool
          template: Se você quer mudar o tempo do seu próprio arquivo mantendo o pitch estável, use TOOL_LINK.
    - question: Existe teste grátis? Como funciona o preço?
      answers:
        - Tanto a extensão quanto o app para iPhone, iPad e Mac incluem um período de teste grátis sem cartão.
        - Depois do teste, o Pitch Changer Online oferece opções semanais, anuais e compra única, enquanto o Pitch Changer Offline oferece assinaturas semanais e anuais, como listado acima.
        - Todos os pagamentos são processados com segurança via Paddle para a extensão ou Apple para o app.
    - question: Como cancelo minha assinatura?
      answers:
        - Clique no botão Manage Subscription dentro do app ou da extensão e siga as instruções.
        - O processo é totalmente automático, então não há necessidade de telefonar ou mandar e-mails.
    - question: Para quem o Pitch Changer foi feito?
      answers:
        - O Pitch Changer foi feito para cantores, músicos, produtores, DJs, professores e qualquer pessoa que precise ajustar a tonalidade das músicas.
        - Seja para estudar em casa, tocar ao vivo, ensinar alunos ou preparar material, ele dá um jeito rápido de levar a música para a tonalidade que funciona para você.
