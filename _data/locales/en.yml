offline:
  title: Pitch Changer Offline
  paragraphs:
    - From practice to production, Pitch Changer helps you transpose, shift pitch, change song key and process audio batches with power and precision.
    - Take full control of your sound with Pitch Changer for iPhone, iPad and Mac. Import audio files, change pitch without changing speed, and batch-process entire folders to prepare practice tracks, teaching material or professional projects.
  bullets:
    - Change pitch of audio files instantly and accurately.
