use_cases:
  title: Who uses Pitch Changer?
  items:
    - title: Vocal coaches & singers
      body: Quickly adjust the key of any song to match a student's vocal range. Run exercises in different keys, explore alternative tonalities and make challenging songs more comfortable to sing.
    - title: Instrumentalists
      body: Guitarists and other instrumentalists can transpose tracks to the key that best suits their instrument or tuning without re-recording or retuning.
    - title: Producers & DJs
      body: Test ideas, remixes and transitions by shifting pitch and key in seconds. Prepare backing tracks, stems and sketches for your DAW or live sets.
    - title: Teachers & learners
      body: Create custom versions of songs for lessons, music theory demonstrations and focused practice sessions.
reviews:
