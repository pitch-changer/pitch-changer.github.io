overview:
  title: What is Pitch Changer?
  paragraphs:
    - Pitch Changer lets you change the key of songs on any website and pitch-shift and transpose music on your computer without complicated audio software. It is built for real-world use like practicing, teaching, recording, and simply having fun with your favorite tracks.
    - "You can:"
  bullets:
    - Change song key up or down in semitones.
    - Practice in the key that fits your voice or instrument.
    - Prepare backing tracks, karaoke versions and teaching materials.
    - Experiment with arrangements, harmonies and creative pitch shifts.
  versions_intro: "Pitch Changer comes in two versions:"
  online_link_label: Pitch Changer Online
  online_link_suffix: a browser extension for websites, and
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: an iPhone, iPad and Mac app for files.
online:
  title: Pitch Changer Online
  paragraphs:
    - Use Pitch Changer to easily change key of songs. Add this intuitive online pitch shifter and transpose music effortlessly.
    - With Pitch Changer Online, you add a pitch shifter extension directly into your browser. Adjust the key of songs on platforms like YouTube and many other audio websites in just a few clicks.
  bullets:
    - Change song key online directly on any website.
    - Works as a YouTube pitch changer and on other music platforms too.
    - Adjust pitch in semitones with intuitive controls.
    - Perfect for practicing along, karaoke or casual listening.
  perfect_for_label: "Perfect for:"
  perfect_for_text: singers, vocal coaches, teachers, schools, instrumentalists and anyone who practices with online videos.
