overview:
  title: Qu'est-ce que Pitch Changer ?
  paragraphs:
    - Pitch Changer vous permet de changer la tonalité des morceaux sur n'importe quel site et de transposer de la musique sur votre ordinateur sans logiciel audio compliqué. L'outil est pensé pour les besoins concrets comme le travail, l'enseignement, l'enregistrement ou simplement le plaisir d'écouter vos titres préférés dans une tonalité plus confortable.
    - "Avec Pitch Changer, vous pouvez :"
  bullets:
    - Monter ou descendre la tonalité d'un morceau par demi-tons.
    - Travailler dans la tonalité qui convient mieux à votre voix ou à votre instrument.
    - Préparer des playbacks, des versions karaoké et du matériel pédagogique.
    - Tester des arrangements, des harmonies et des idées créatives de déplacement de hauteur.
  versions_intro: "Pitch Changer existe en deux versions :"
  online_link_label: Changement de Tonalité
  online_link_suffix: comme extension pour les sites, et
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: comme application iPhone, iPad et Mac pour travailler sur des fichiers.
online:
  title: Changement de Tonalité
  paragraphs:
    - Utilisez Changement de Tonalité pour changer facilement la tonalité d'un morceau pendant qu'il joue déjà. C'est une manière simple de transposer la musique sans quitter votre navigateur.
    - Pitch Changer Online ajoute le contrôle de tonalité directement dans le navigateur. Changez la tonalité sur YouTube et sur de nombreux autres sites audio en quelques clics.
  bullets:
    - Changez la tonalité d'un morceau en ligne directement sur n'importe quel site.
    - Fonctionne comme outil pour changer la tonalité sur YouTube et sur d'autres plateformes musicales.
    - Réglez la hauteur par demi-tons avec des commandes claires.
    - Très pratique pour travailler avec un morceau, chanter en karaoké ou écouter dans une tonalité plus adaptée.
  perfect_for_label: "Idéal pour :"
  perfect_for_text: chanteuses et chanteurs, professeurs de chant, enseignants, écoles, instrumentistes et toutes les personnes qui travaillent avec des vidéos en ligne.
  pricing_template: "Après l'essai gratuit : WEEKLY_PRICE, YEARLY_PRICE ou LIFETIME_PRICE."
  offer_templates:
    weekly: "PRICE_VALUE $ par semaine"
    yearly: "PRICE_VALUE $ par an"
    lifetime: "paiement unique de PRICE_VALUE $"
  cta: Ajouter Changement de Tonalité au navigateur
  image_alt: Installez l'extension Pitch Changer et ajoutez-la à votre navigateur en quelques secondes.
offline:
  title: Pitch Changer Offline
  paragraphs:
    - Du travail à la production, Pitch Changer vous aide à transposer, déplacer la hauteur, changer la tonalité et traiter des lots audio avec précision.
    - Avec Pitch Changer pour iPhone, iPad et Mac, vous importez des fichiers audio, changez la hauteur sans toucher à la vitesse et traitez des dossiers complets pour préparer des pistes de travail, du matériel pédagogique ou des projets professionnels.
  bullets:
    - Changez la hauteur des fichiers audio rapidement et précisément.
    - Transposez la musique vers le haut ou vers le bas sans changer le tempo.
    - Traitez plusieurs morceaux en une seule opération.
    - Fonctionne hors ligne sans connexion internet active.
    - Prend en charge des formats courants comme MP3, WAV, FLAC et d'autres.
  perfect_for_label: "Idéal pour :"
  perfect_for_text: producteurs, DJ, enseignants et musiciens qui travaillent avec des fichiers audio locaux.
  pricing_template: "Après l'essai gratuit : WEEKLY_PRICE ou YEARLY_PRICE."
  offer_templates:
    weekly: "PRICE_VALUE $ par semaine"
    yearly: "PRICE_VALUE $ par an"
  cta: Ajouter Pitch Changer sur iPhone, iPad ou Mac
  image_alt: Téléchargez Pitch Changer pour iPhone, iPad ou Mac et gardez vos projets dans la bonne tonalité.
use_cases:
  title: Qui utilise Pitch Changer ?
  items:
    - title: Professeurs de chant et chanteurs
      body: Ajustez rapidement la tonalité d'un morceau à la tessiture d'un élève. Faites des exercices dans plusieurs tonalités, essayez d'autres options et rendez les morceaux difficiles plus confortables à chanter.
    - title: Instrumentistes
      body: Les guitaristes et autres instrumentistes peuvent transposer des pistes dans la tonalité la mieux adaptée à leur instrument ou à leur accordage sans réenregistrer ni réaccorder.
    - title: Producteurs et DJ
      body: Testez des idées, des remixes et des transitions en déplaçant hauteur et tonalité en quelques secondes. Préparez des playbacks, des stems et des esquisses pour votre DAW ou votre set live.
    - title: Enseignants et élèves
      body: Créez des versions sur mesure de morceaux pour des cours, des démonstrations de théorie musicale et des séances de travail plus ciblées.
reviews:
  title: Ce que disent nos utilisateurs
  subtitle: Voici les retours des personnes qui ont adopté Pitch Changer
  items:
    - name: Grant Kimbell
      text: Je recommande vraiment de choisir un réglage au hasard, sans aller trop loin, puis de lancer la playlist. On a l'impression de redécouvrir un morceau qu'on aime, mais avec une ambiance totalement différente. La qualité du changement de hauteur est excellente.
    - name: Vadim Makarov
      text: Je suis professeur de chant et j'ai souvent besoin d'ajuster la tonalité des morceaux pour mes élèves. L'extension fonctionne parfaitement sur différents sites, pas seulement sur YouTube, sans bug ni plantage. Et elle est très simple, ce qui est un énorme avantage.
    - name: Nikola Negovanovic
      text: Après plusieurs mois d'utilisation, je peux dire que c'est la meilleure application de changement de tonalité pour Chrome. Elle vaut clairement son prix.
    - name: The Real Spiro Agnew
      text: Excellent, ça fonctionne comme un rêve.
    - name: Ice
      text: C'est exactement ce que j'attends d'une bonne extension de navigateur.
    - name: maryam seddigh
      text: C'est incroyable. Je cherchais quelque chose comme ça depuis très longtemps.
    - name: Hans Harding
      text: Super outil pour moi en tant que bassiste lorsqu'un morceau doit être joué dans une autre tonalité.
    - name: Kieran Brown
      text: Il y a ce youtubeur qui fait de très bonnes vidéos, mais je ne supporte pas sa voix geignarde. Avec cette extension, c'est beaucoup plus agréable à écouter.
    - name: lilly imaginator
      text: À mon avis, c'est une extension indispensable. Parfaite pour le karaoké, l'apprentissage de la musique ou simplement pour entendre des morceaux plus haut ou plus bas.
faq:
  title: Questions fréquentes
  items:
    - question: Quelle est la différence entre Pitch Changer Online et Pitch Changer Offline ?
      answers:
        - Pitch Changer Online est une extension de navigateur qui change la tonalité des morceaux directement sur des sites comme YouTube et d'autres plateformes audio ou vidéo.
        - Pitch Changer Offline est une application autonome pour iPhone, iPad et Mac qui fonctionne hors ligne avec vos fichiers audio et peut traiter plusieurs pistes à la fois.
    - question: Ai-je besoin d'une connexion internet pour utiliser Pitch Changer ?
      answers:
        - L'extension Pitch Changer fonctionne dans votre navigateur et est conçue pour du contenu en ligne, vous l'utiliserez donc le plus souvent avec une connexion internet.
        - L'application pour iPhone, iPad et Mac fonctionne entièrement hors ligne avec des fichiers audio locaux, donc une fois installée, vous pouvez l'utiliser sans connexion active.
    - question: Quels formats audio sont pris en charge par Pitch Changer Offline ?
      answers:
        - L'application pour iPhone, iPad et Mac prend en charge des formats courants comme MP3, WAV, FLAC et d'autres, ce qui vous permet de traiter les fichiers que vous avez déjà sans conversion préalable.
        - Vous pouvez aussi ajouter des vidéos, des régions depuis votre DAW et des dossiers complets. Pitch Changer extrait l'audio pour vous.
    - question: Le changement de hauteur affecte-t-il la qualité audio ?
      answers:
        - Pitch Changer est conçu pour préserver la qualité audio pendant que vous ajustez la tonalité. Nos utilisateurs disent régulièrement que la qualité du changement de hauteur est excellente.
        - Comme pour tout traitement numérique, des changements très extrêmes peuvent sonner moins naturellement, mais dans la plupart des cas le résultat reste propre et musical.
    - question: Je ne trouve pas de versions instrumentales des morceaux. Pouvez-vous m'aider ?
      answers: []
      answer_html: Essayez notre <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>. Il retire les voix d'un morceau en ligne ou hors ligne et se marie très bien avec Pitch Changer.
    - question: Comment puis-je changer le tempo d'un morceau ?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Si vous voulez ralentir ou accélérer la musique sur un site pendant qu'elle joue déjà, utilisez TOOL_LINK.
        - tool_key: speed_tool
          template: Si vous voulez changer le tempo de votre propre fichier tout en gardant la hauteur stable, utilisez TOOL_LINK.
    - question: Y a-t-il un essai gratuit ? Comment fonctionne le prix ?
      answers:
        - L'extension comme l'application pour iPhone, iPad et Mac incluent une période d'essai gratuite sans carte bancaire.
        - Après l'essai, Pitch Changer Online propose des formules hebdomadaires, annuelles et un achat unique, tandis que Pitch Changer Offline propose des abonnements hebdomadaires et annuels, comme indiqué plus haut.
        - Tous les paiements sont traités de manière sécurisée via Paddle pour l'extension ou Apple pour l'application.
    - question: Comment résilier mon abonnement ?
      answers:
        - Cliquez sur le bouton Manage Subscription dans l'application ou l'extension puis suivez les instructions.
        - Le processus est entièrement automatique, vous n'avez donc pas besoin d'appeler ni d'envoyer des e-mails.
    - question: À qui s'adresse Pitch Changer ?
      answers:
        - Pitch Changer s'adresse aux chanteurs, musiciens, producteurs, DJ, enseignants et à toutes les personnes qui doivent ajuster la tonalité des morceaux.
        - Que vous travailliez chez vous, jouiez en live, enseigniez à des élèves ou prépariez du contenu, il vous donne un moyen rapide d'amener la musique dans la tonalité qui vous convient.
