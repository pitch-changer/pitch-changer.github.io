offline:
  title: Pitch Changer Offline
  paragraphs:
    - Dallo studio alla produzione, Pitch Changer ti aiuta a trasporre, cambiare altezza, cambiare tonalità e lavorare su gruppi di file con precisione.
    - Con Pitch Changer per iPhone, iPad e Mac importi file audio, cambi intonazione senza toccare la velocità e lavori su cartelle intere per preparare tracce per prove, lezioni o progetti professionali.
  bullets:
    - Cambia rapidamente e con precisione l'intonazione dei file audio.
    - Trasponi la musica verso l'alto o verso il basso senza cambiare il tempo.
    - Elabora più brani in una sola volta.
    - Funziona offline senza connessione internet attiva.
    - Supporta formati comuni come MP3, WAV, FLAC e altri.
  perfect_for_label: "Ideale per:"
  perfect_for_text: producer, DJ, insegnanti e musicisti che lavorano con file audio locali.
