overview:
  title: Cos'è Pitch Changer?
  paragraphs:
    - Pitch Changer ti permette di cambiare la tonalità dei brani su qualsiasi sito e di trasporre musica sul computer senza software audio complicati. È pensato per prove, lezioni, registrazioni e per divertirti con i tuoi brani preferiti.
    - "Con Pitch Changer puoi:"
  bullets:
    - Cambiare la tonalità di un brano in su o in giù di semitoni.
    - Studiare nella tonalità più comoda per la tua voce o il tuo strumento.
    - Preparare basi, versioni karaoke e materiali didattici.
    - Provare arrangiamenti, armonie e idee creative di trasposizione.
  versions_intro: "Pitch Changer è disponibile in due versioni:"
  online_link_label: Cambio Tonalità Online
  online_link_suffix: come estensione per i siti, e
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: come app per iPhone, iPad e Mac per lavorare sui file.
online:
  title: Cambio Tonalità Online
  paragraphs:
    - Usa Cambio Tonalità Online per cambiare facilmente la tonalità dei brani mentre ascolti. È un modo semplice per trasporre la musica senza uscire dal browser.
    - Pitch Changer Online aggiunge un controllo di tonalità direttamente nel browser. Puoi cambiare tonalità su YouTube e su molti altri siti audio in pochi clic.
  bullets:
    - Cambia la tonalità di un brano online direttamente su qualsiasi sito.
    - Funziona come strumento per cambiare tonalità su YouTube e su altre piattaforme musicali.
    - Regola l'intonazione in semitoni con controlli chiari.
    - Ottimo per studiare insieme a un brano, fare karaoke o ascoltare in una tonalità più comoda.
  perfect_for_label: "Ideale per:"
  perfect_for_text: cantanti, vocal coach, insegnanti, scuole, strumentisti e chiunque studi con video online.
  pricing_template: "Dopo la prova gratuita: WEEKLY_PRICE, YEARLY_PRICE oppure LIFETIME_PRICE."
