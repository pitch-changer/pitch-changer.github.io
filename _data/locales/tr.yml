use_cases:
  title: Pitch Changer'ı kimler kullanıyor?
  items:
    - title: Vokal koçları ve şarkıcılar
      body: Herhangi bir şarkının tonunu öğrencinin ses aralığına hızla uyarlayın. Farklı tonlarda alıştırmalar yapın, alternatifler deneyin ve zor şarkıları söylemesi daha rahat hale getirin.
    - title: Enstrümancılar
      body: Gitaristler ve diğer enstrümancılar, tekrar kayıt almadan veya yeniden akort yapmadan parçaları enstrümanlarına ya da akort düzenlerine daha uygun tona taşıyabilir.
    - title: Prodüktörler ve DJ'ler
      body: Pitch ve tonu saniyeler içinde değiştirerek fikirleri, remixleri ve geçişleri test edin. DAW veya canlı setler için backing track, stem ve taslaklar hazırlayın.
    - title: Öğretmenler ve öğrenciler
      body: Dersler, müzik teorisi gösterimleri ve odaklı çalışma oturumları için şarkıların özel sürümlerini hazırlayın.
reviews:
  title: Kullanıcılarımız ne diyor?
  subtitle: Pitch Changer'ı deneyip beğenen kişilerden dinleyin
  items:
    - name: Grant Kimbell
      text: Gerçekten çok uç olmayan rastgele bir ayar seçip çalma listenizi karıştırmanızı tavsiye ederim. Sevdiğiniz bir şarkıyı sanki ilk kez ama bambaşka bir havada duyuyormuş gibi hissettiriyor. Pitch değişiminin kalitesi mükemmel.
    - name: Vadim Makarov
      text: Ben bir vokal koçuyum ve öğrenciler için sık sık şarkı tonunu ayarlamam gerekiyor. Uzantı yalnızca YouTube'da değil, farklı sitelerde de hatasız ve çökmeden mükemmel çalışıyor. Ayrıca çok basit olması da büyük avantaj.
    - name: Nikola Negovanovic
      text: Birkaç ay kullandıktan sonra Chrome için en iyi pitch changer uygulaması olduğunu rahatlıkla söyleyebilirim. Kesinlikle parasına değer.
    - name: The Real Spiro Agnew
      text: Harika, rüya gibi çalışıyor.
    - name: Ice
      text: İyi bir tarayıcı uzantısından beklediğim şey tam olarak bu.
    - name: maryam seddigh
      text: Muhteşem. Bunu çok uzun zamandır arıyordum.
    - name: Hans Harding
      text: Bir şarkıyı yeni bir tonda çalmak gerektiğinde bas gitarist olarak benim için müthiş bir araç.
    - name: Kieran Brown
      text: Gerçekten iyi videolar yapan bir YouTuber var ama o cırlak sesine dayanamıyorum. Bu sayede kulak için çok daha katlanılabilir oluyor.
    - name: lilly imaginator
      text: Bence mutlaka olması gereken bir uzantı. Karaoke, müzik öğrenmek ya da şarkıların daha tiz veya pes halinde nasıl duyulduğunu denemek için harika.
faq:
  title: Sık sorulan sorular
  items:
    - question: Pitch Changer Online ile Pitch Changer Offline arasındaki fark nedir?
      answers:
        - Pitch Changer Online, YouTube gibi sitelerde ve diğer ses ya da video platformlarında şarkı tonunu doğrudan değiştiren bir tarayıcı uzantısıdır.
        - Pitch Changer Offline, kendi ses dosyalarınızla offline çalışan ve aynı anda birden fazla parçayı toplu işleyebilen bağımsız bir iPhone, iPad ve Mac uygulamasıdır.
    - question: Pitch Changer kullanmak için internet bağlantısı gerekir mi?
      answers:
        - Pitch Changer uzantısı tarayıcınızda çalışır ve online içerik için tasarlanmıştır, bu yüzden genelde internete bağlıyken kullanırsınız.
        - iPhone, iPad ve Mac uygulaması yerel ses dosyalarıyla tamamen offline çalışır, bu nedenle kurulduktan sonra aktif bağlantı gerekmez.
    - question: Pitch Changer Offline hangi ses formatlarını destekler?
      answers:
        - iPhone, iPad ve Mac uygulaması MP3, WAV, FLAC gibi yaygın ses formatlarıyla çalışır; böylece elinizdeki dosyaları dönüştürmeden işleyebilirsiniz.
        - Videoları, DAW bölümlerini ve tüm klasörleri de ekleyebilirsiniz. Pitch Changer sesi sizin için çıkarır.
    - question: Pitch değiştirmek ses kalitesini etkiler mi?
      answers:
        - Pitch Changer, tonu ayarlarken ses kalitesini korumak için tasarlanmıştır. Kullanıcılarımız da pitch değişim kalitesinin çok iyi olduğunu sık sık söylüyor.
        - Her dijital pitch işlemede olduğu gibi çok uç ayarlar daha az doğal duyulabilir, ancak çoğu durumda sonuç temiz ve müzikal kalır.
    - question: Şarkıların enstrümantal sürümlerini bulamıyorum. Yardımcı olabilir misiniz?
      answers: []
      answer_html: <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>'ımıza göz atın. Şarkıdan vokali online veya offline kaldırır ve Pitch Changer ile çok iyi çalışır.
    - question: Bir şarkının temposunu nasıl değiştirebilirim?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Bir sitede zaten çalan müziği yavaşlatmak ya da hızlandırmak istiyorsanız TOOL_LINK kullanın.
        - tool_key: speed_tool
          template: Kendi dosyanızın temposunu değiştirip pitch'i sabit tutmak istiyorsanız TOOL_LINK kullanın.
    - question: Ücretsiz deneme var mı? Fiyatlandırma nasıl çalışıyor?
      answers:
        - Hem uzantı hem de iPhone, iPad ve Mac uygulaması kart gerektirmeyen ücretsiz deneme süresi içerir.
        - Denemeden sonra Pitch Changer Online haftalık, yıllık ve tek seferlik satın alma seçenekleri sunar; Pitch Changer Offline ise haftalık ve yıllık abonelikler sunar.
        - Tüm ödemeler uzantı için Paddle, uygulama için Apple üzerinden güvenli şekilde işlenir.
    - question: Aboneliğimi nasıl iptal ederim?
      answers:
        - Uygulama veya uzantı içindeki Manage Subscription düğmesine tıklayın ve oradaki adımları izleyin.
        - Süreç tamamen otomatiktir, bu yüzden aramanız ya da e-posta göndermeniz gerekmez.
    - question: Pitch Changer kimler için yapıldı?
      answers:
        - Pitch Changer; şarkıcılar, müzisyenler, prodüktörler, DJ'ler, öğretmenler ve şarkı tonunu ayarlaması gereken herkes için yapılmıştır.
        - İster evde çalışın, ister canlı performans hazırlayın, ister öğrencilere ders verin ya da içerik hazırlayın; müziği size uyan tona hızlıca taşımanıza yardımcı olur.
