overview:
  title: Pitch Changer nedir?
  paragraphs:
    - Pitch Changer ile herhangi bir sitede şarkı tonunu değiştirebilir ve bilgisayarınızda müziği karmaşık ses yazılımlarına gerek kalmadan transpoze edebilirsiniz. Pratik, ders, kayıt ya da sevdiğiniz şarkıları daha rahat bir tonda dinlemek gibi gerçek ihtiyaçlar için tasarlanmıştır.
    - "Şunları yapabilirsiniz:"
  bullets:
    - Şarkı tonunu yarım ses aralıklarıyla yukarı veya aşağı değiştirmek.
    - Sesinize ya da enstrümanınıza daha iyi uyan tonda çalışmak.
    - Backing track, karaoke sürümü ve ders materyali hazırlamak.
    - Düzenleme, armoni ve yaratıcı pitch değişimleri denemek.
  versions_intro: "Pitch Changer iki sürümle sunulur:"
  online_link_label: Tonu Değiştirici
  online_link_suffix: siteler için bir tarayıcı uzantısıdır, ve
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: dosyalar için bir iPhone, iPad ve Mac uygulamasıdır.
online:
  title: Tonu Değiştirici
  paragraphs:
    - Tonu Değiştirici'yi kullanarak çalarken bile şarkı tonunu kolayca değiştirebilirsiniz. Tarayıcıdan ayrılmadan müziği transpoze etmenin pratik bir yoludur.
    - Pitch Changer Online ton kontrolünü doğrudan tarayıcınıza ekler. YouTube ve diğer birçok ses sitesinde sadece birkaç tıklamayla ton değiştirin.
  bullets:
    - Herhangi bir sitede şarkı tonunu online olarak doğrudan değiştirin.
    - YouTube ve diğer müzik platformlarında ton değiştirme aracı olarak çalışır.
    - Pitch'i yarım ses aralıklarıyla net kontroller üzerinden ayarlayın.
    - Birlikte çalmak, karaoke yapmak veya daha rahat bir tonda dinlemek için çok uygundur.
  perfect_for_label: "Şunlar için ideal:"
  perfect_for_text: şarkıcılar, vokal koçları, öğretmenler, okullar, enstrümancılar ve online videolarla çalışan herkes.
