offline:
  title: Pitch Changer Offline
  paragraphs:
    - Çalışmadan prodüksiyona kadar Pitch Changer, şarkıları transpoze etmenize, pitch kaydırmanıza, ton değiştirmenize ve sesi toplu olarak hassas biçimde işlemenize yardımcı olur.
    - iPhone, iPad ve Mac için Pitch Changer ile ses dosyalarını içe aktarabilir, hızı değiştirmeden pitch ayarlayabilir ve çalışma parçaları, ders materyalleri ya da profesyonel projeler hazırlamak için tüm klasörleri işleyebilirsiniz.
  bullets:
    - Ses dosyalarının pitch'ini hızlı ve doğru biçimde değiştirin.
    - Tempoyu değiştirmeden müziği yukarı ya da aşağı transpoze edin.
    - Birden fazla şarkıyı tek seferde işleyin.
    - Aktif internet bağlantısı olmadan offline çalışır.
    - MP3, WAV, FLAC ve diğer yaygın formatları destekler.
  perfect_for_label: "Şunlar için ideal:"
  perfect_for_text: yerel ses dosyalarıyla çalışan prodüktörler, DJ'ler, öğretmenler ve müzisyenler.
  pricing_template: "Ücretsiz denemeden sonra: WEEKLY_PRICE veya YEARLY_PRICE."
  offer_templates:
