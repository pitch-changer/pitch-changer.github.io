  image_alt: Installer Pitch Changer-udvidelsen og tilføj den til browseren på få sekunder.
offline:
  title: Pitch Changer Offline
  paragraphs:
    - Fra øvning til produktion hjælper Pitch Changer dig med at transponere, flytte pitch, ændre toneart på sange og batchbehandle lyd præcist.
    - Med Pitch Changer til iPhone, iPad og Mac kan du importere lydfiler, ændre pitch uden at ændre hastighed og behandle hele mapper for at forberede øvespor, undervisningsmateriale eller professionelle projekter.
  bullets:
    - Ændr pitch på lydfiler hurtigt og præcist.
    - Transponér musik op eller ned uden at ændre tempo.
    - Behandl flere sange i én omgang.
    - Virker offline uden aktiv internetforbindelse.
    - Understøtter almindelige formater som MP3, WAV, FLAC og flere.
  perfect_for_label: "Perfekt til:"
  perfect_for_text: producere, DJ's, lærere og musikere der arbejder med lokale lydfiler.
