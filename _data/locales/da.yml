use_cases:
  title: Hvem bruger Pitch Changer?
  items:
    - title: Vokalcoaches og sangere
      body: Justér hurtigt tonearten på enhver sang så den passer til en elevs stemmeleje. Kør øvelser i forskellige tonearter, prøv alternativer og gør svære sange mere behagelige at synge.
    - title: Instrumentalister
      body: Guitarister og andre instrumentalister kan transponere spor til den toneart der passer bedst til instrumentet eller stemningen uden at optage igen eller stemme om.
    - title: Producere og DJ's
      body: Test idéer, remixes og overgange ved at flytte pitch og toneart på få sekunder. Forbered backing tracks, stems og skitser til din DAW eller dit livesæt.
    - title: Lærere og elever
      body: Lav skræddersyede versioner af sange til undervisning, musikteoridemonstrationer og fokuserede øveforløb.
reviews:
  title: Hvad vores brugere siger
  subtitle: Hør fra folk der har prøvet og elsket Pitch Changer
  items:
    - name: Grant Kimbell
      text: Jeg kan virkelig anbefale at vælge en tilfældig indstilling, bare ikke for ekstrem, og sætte afspilningslisten på shuffle. Det føles som at høre en sang du elsker for første gang igen, bare med en helt anden stemning. Kvaliteten af pitchskiftet er fremragende.
    - name: Vadim Makarov
      text: Jeg er vokalcoach og skal ofte justere tonearten på sange til elever. Udvidelsen fungerer perfekt på forskellige hjemmesider, ikke kun YouTube, uden fejl eller nedbrud. Den er også meget enkel, og det er en stor fordel.
    - name: Nikola Negovanovic
      text: Efter flere måneders brug kan jeg bekræfte at dette er den bedste pitch changer-app til Chrome. Helt sikkert pengene værd.
    - name: The Real Spiro Agnew
      text: Fremragende, fungerer som en drøm.
    - name: Ice
      text: Det er præcis det jeg forventer af en god browserudvidelse.
    - name: maryam seddigh
      text: Den er fantastisk. Jeg har ledt efter dette i lang tid.
    - name: Hans Harding
      text: Fantastisk værktøj for mig som bassist når en sang skal spilles i en ny toneart.
    - name: Kieran Brown
      text: Der er en YouTuber som laver virkelig gode videoer, men jeg kan ikke holde hans pivende bedstemorstemme ud. Det her gør det meget lettere at lytte.
    - name: lilly imaginator
      text: Efter min mening er dette en uundværlig udvidelse. Fantastisk til karaoke, at lære musik eller bare lege med hvordan sange lyder højere eller lavere.
faq:
  title: Ofte stillede spørgsmål
  items:
    - question: Hvad er forskellen på Pitch Changer Online og Pitch Changer Offline?
      answers:
        - Pitch Changer Online er en browserudvidelse der ændrer tonearten på sange direkte på hjemmesider som YouTube og andre lyd- eller videoplatforme.
        - Pitch Changer Offline er en selvstændig iPhone-, iPad- og Mac-app der virker offline med dine egne lydfiler og kan batchbehandle flere spor på én gang.
    - question: Skal jeg have internetforbindelse for at bruge Pitch Changer?
      answers:
        - Pitch Changer-udvidelsen kører i din browser og er lavet til indhold på nettet, så du vil typisk bruge den mens du er forbundet til internettet.
        - iPhone-, iPad- og Mac-appen virker helt offline med lokale lydfiler, så når den først er installeret kan du bruge den uden aktiv forbindelse.
    - question: Hvilke lydformater understøtter Pitch Changer Offline?
      answers:
        - iPhone-, iPad- og Mac-appen virker med almindelige lydformater som MP3, WAV, FLAC og flere, så du kan behandle de filer du allerede har uden at konvertere dem først.
        - Du kan også tilføje videoer, regioner fra din DAW og hele mapper. Pitch Changer udtrækker lyden for dig.
    - question: Påvirker det lydkvaliteten at ændre pitch?
      answers:
        - Pitch Changer er designet til at bevare lydkvaliteten mens du justerer tonearten. Brugerne siger jævnligt at kvaliteten af pitchskiftet er fremragende.
        - Som ved al digital pitchbehandling kan meget ekstreme ændringer lyde mindre naturlige, men i de fleste tilfælde forbliver resultatet rent og musikalsk.
    - question: Jeg kan ikke finde instrumentale versioner af sange. Kan I hjælpe?
      answers: []
      answer_html: Prøv vores <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>. Den fjerner vokal fra en sang online eller offline og fungerer virkelig godt sammen med Pitch Changer.
    - question: Hvordan kan jeg ændre tempoet på en sang?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Hvis du vil sætte musik på en hjemmeside ned eller op i tempo mens den allerede spiller, så brug TOOL_LINK.
        - tool_key: speed_tool
          template: Hvis du vil ændre tempoet på din egen fil og bevare pitch, så brug TOOL_LINK.
    - question: Er der en gratis prøveperiode? Hvordan fungerer priserne?
      answers:
        - Både udvidelsen og iPhone-, iPad- og Mac-appen har en gratis prøveperiode uden kort.
        - Efter prøveperioden tilbyder Pitch Changer Online ugentlige, årlige og engangskøb, mens Pitch Changer Offline tilbyder ugentlige og årlige abonnementer som vist ovenfor.
        - Alle betalinger håndteres sikkert via Paddle for udvidelsen eller Apple for appen.
    - question: Hvordan opsiger jeg mit abonnement?
      answers:
        - Klik på knappen Manage Subscription i appen eller udvidelsen og følg vejledningen der.
        - Processen er helt automatisk, så du behøver ikke ringe eller skrive e-mails.
    - question: Hvem er Pitch Changer lavet til?
      answers:
        - Pitch Changer er lavet til sangere, musikere, producere, DJ's, lærere og alle der har brug for at justere tonearten på sange.
        - Uanset om du øver derhjemme, spiller live, underviser elever eller forbereder materiale, giver den dig en hurtig måde at få musikken over i den toneart der passer til dig.
