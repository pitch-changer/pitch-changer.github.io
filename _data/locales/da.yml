  title: Toneart Skift
  paragraphs:
    - Brug Toneart Skift til nemt at ændre toneart på sange mens de allerede spiller. Det er en enkel måde at transponere musik på uden at forlade browseren.
    - Pitch Changer Online lægger toneartskontroller direkte ind i browseren. Skift toneart på YouTube og mange andre lydhjemmesider med blot få klik.
  bullets:
    - Skift toneart på sange online direkte på enhver hjemmeside.
    - Fungerer som værktøj til at ændre toneart på YouTube og andre musikplatforme.
    - Justér pitch i halvtoner med tydelige kontroller.
    - Perfekt til at spille med, synge karaoke eller lytte i en mere behagelig toneart.
  perfect_for_label: "Perfekt til:"
  perfect_for_text: sangere, vokalcoaches, lærere, skoler, instrumentalister og alle der øver med onlinevideoer.
  pricing_template: "Efter gratisperioden: WEEKLY_PRICE, YEARLY_PRICE eller LIFETIME_PRICE."
