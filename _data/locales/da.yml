overview:
  title: Hvad er Pitch Changer?
  paragraphs:
    - Med Pitch Changer kan du ændre tonearten på sange på enhver hjemmeside og transponere musik på din computer uden kompliceret lydsoftware. Det er lavet til virkelige behov som øvning, undervisning, optagelse eller bare det at nyde yndlingssange i en mere behagelig toneart.
    - "Du kan:"
  bullets:
    - Ændre tonearten på en sang op eller ned i halvtoner.
    - Øve i en toneart der passer bedre til din stemme eller dit instrument.
    - Forberede backing tracks, karaokeversioner og undervisningsmateriale.
    - Eksperimentere med arrangementer, harmonier og kreative pitchskift.
  versions_intro: "Pitch Changer findes i to versioner:"
  online_link_label: Toneart Skift
  online_link_suffix: en browserudvidelse til hjemmesider, og
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: en iPhone-, iPad- og Mac-app til filer.
