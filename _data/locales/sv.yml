use_cases:
  title: Vem använder Pitch Changer?
  items:
    - title: Sångpedagoger och sångare
      body: Justera snabbt tonarten på vilken låt som helst så att den passar elevens röstomfång. Kör övningar i olika tonarter, utforska alternativ och gör svåra låtar mer bekväma att sjunga.
    - title: Instrumentalister
      body: Gitarrister och andra instrumentalister kan transponera spår till den tonart som passar deras instrument eller stämning bäst utan att spela in eller stämma om.
    - title: Producenter och DJ:er
      body: Testa idéer, remixer och övergångar genom att flytta pitch och tonart på några sekunder. Förbered backing tracks, stems och skisser för DAW eller liveset.
    - title: Lärare och elever
      body: Skapa egna versioner av låtar för lektioner, musikteoridemonstrationer och fokuserade övningspass.
reviews:
  title: Vad våra användare säger
  subtitle: Hör från människor som har testat och gillat Pitch Changer
  items:
    - name: Grant Kimbell
      text: Jag kan verkligen rekommendera att välja en slumpmässig inställning, bara inte för extrem, och shuffla spellistan. Det känns som att höra en låt du älskar för första gången igen, fast i en helt annan känsla. Kvaliteten på pitchförändringen är fantastisk.
    - name: Vadim Makarov
      text: Jag är sångpedagog och behöver ofta justera tonarter för elever. Tillägget fungerar perfekt på olika webbplatser, inte bara YouTube, utan buggar eller krascher. Det är också väldigt enkelt, och det är en stor fördel.
    - name: Nikola Negovanovic
      text: Efter flera månaders användning kan jag säga att det här är den bästa pitch changer-appen för Chrome. Helt klart värd priset.
    - name: The Real Spiro Agnew
      text: Utmärkt, fungerar som en dröm.
    - name: Ice
      text: Det här är precis vad jag förväntar mig av ett bra webbläsartillägg.
    - name: maryam seddigh
      text: Det är fantastiskt. Jag har letat efter det här länge.
    - name: Hans Harding
      text: Ett fantastiskt verktyg för mig som bassist när en låt behöver spelas i en ny tonart.
    - name: Kieran Brown
      text: Det finns en YouTuber som gör riktigt bra videor men jag står inte ut med hans gnälliga röst. Det här gör det mycket lättare att lyssna.
    - name: lilly imaginator
      text: I mina ögon är det här ett måste-tillägg. Perfekt för karaoke, att lära sig musik eller bara leka med hur låtar låter högre eller lägre.
faq:
  title: Vanliga frågor
  items:
    - question: Vad är skillnaden mellan Pitch Changer Online och Pitch Changer Offline?
      answers:
        - Pitch Changer Online är ett webbläsartillägg som ändrar tonart på låtar direkt på webbplatser som YouTube och andra ljud- eller videoplattformar.
        - Pitch Changer Offline är en fristående app för iPhone, iPad och Mac som fungerar offline med dina egna ljudfiler och kan batchbearbeta flera spår samtidigt.
    - question: Behöver jag en internetanslutning för att använda Pitch Changer?
      answers:
        - Pitch Changer-tillägget körs i webbläsaren och är gjort för innehåll online, så du använder det normalt när du är ansluten till internet.
        - Appen för iPhone, iPad och Mac fungerar helt offline med lokala ljudfiler, så när den väl är installerad kan du använda den utan aktiv anslutning.
    - question: Vilka ljudformat stöder Pitch Changer Offline?
      answers:
        - Appen för iPhone, iPad och Mac fungerar med vanliga ljudformat som MP3, WAV, FLAC och fler, så du kan bearbeta de filer du redan har utan att konvertera dem först.
        - Du kan också lägga till videor, regioner från din DAW och hela mappar. Pitch Changer extraherar ljudet åt dig.
    - question: Påverkar ändrad pitch ljudkvaliteten?
      answers:
        - Pitch Changer är byggt för att bevara ljudkvaliteten medan du justerar tonarten. Våra användare säger regelbundet att kvaliteten på pitchförändringen är utmärkt.
        - Som med all digital pitchbearbetning kan väldigt extrema ändringar låta mindre naturliga, men i de flesta fall förblir resultatet rent och musikaliskt.
    - question: Jag hittar inga instrumentala versioner av låtar. Kan ni hjälpa?
      answers: []
      answer_html: Kolla in vår <a href="https://removevocalsfromasong.com/?utm_source=pitch-changer.com" class="underline">Vocal Remover</a>. Den tar bort sång från en låt online eller offline och fungerar väldigt bra ihop med Pitch Changer.
    - question: Hur kan jag ändra tempot på en låt?
      answers: []
      linked_answers:
        - tool_key: bpm_extension
          template: Om du vill sakta ner eller snabba upp musik på en webbplats medan den redan spelar, använd TOOL_LINK.
        - tool_key: speed_tool
          template: Om du vill ändra tempot på din egen fil men behålla samma pitch, använd TOOL_LINK.
    - question: Finns det en gratis provperiod? Hur fungerar priset?
      answers:
        - Både tillägget och appen för iPhone, iPad och Mac har en gratis provperiod utan kort.
        - Efter provperioden erbjuder Pitch Changer Online veckovisa, årliga och engångsköp, medan Pitch Changer Offline erbjuder veckovisa och årliga abonnemang, enligt ovan.
        - Alla betalningar hanteras säkert via Paddle för tillägget eller Apple för appen.
    - question: Hur säger jag upp min prenumeration?
      answers:
        - Klicka på knappen Manage Subscription i appen eller tillägget och följ instruktionerna där.
        - Processen är helt automatisk, så du behöver inte ringa eller skicka e-post.
    - question: Vem är Pitch Changer till för?
      answers:
        - Pitch Changer är gjort för sångare, musiker, producenter, DJ:er, lärare och alla som behöver justera tonarten på låtar.
        - Oavsett om du övar hemma, spelar live, undervisar elever eller förbereder material ger det dig ett snabbt sätt att få musiken till den tonart som fungerar för dig.
