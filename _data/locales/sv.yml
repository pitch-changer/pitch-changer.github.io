    yearly: "PRICE_VALUE $ per år"
    lifetime: "engångsbetalning på PRICE_VALUE $"
  cta: Lägg till Ändra tonart i webbläsaren
  image_alt: Installera Pitch Changer-tillägget och lägg till det i webbläsaren på några sekunder.
offline:
  title: Pitch Changer Offline
  paragraphs:
    - Från övning till produktion hjälper Pitch Changer dig att transponera, flytta pitch, ändra tonart på låtar och batchbearbeta ljud med precision.
    - Med Pitch Changer för iPhone, iPad och Mac kan du importera ljudfiler, ändra pitch utan att ändra hastighet och bearbeta hela mappar för att förbereda övningsspår, undervisningsmaterial eller professionella projekt.
  bullets:
    - Ändra pitch på ljudfiler snabbt och exakt.
    - Transponera musik upp eller ner utan att ändra tempo.
    - Bearbeta flera låtar i ett svep.
    - Fungerar offline utan aktiv internetanslutning.
    - Stöder vanliga format som MP3, WAV, FLAC och fler.
  perfect_for_label: "Perfekt för:"
  perfect_for_text: producenter, DJ:er, lärare och musiker som arbetar med lokala ljudfiler.
