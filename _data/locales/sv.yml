overview:
  title: Vad är Pitch Changer?
  paragraphs:
    - Med Pitch Changer kan du ändra tonart på låtar på vilken webbplats som helst och transponera musik på datorn utan krånglig ljudprogramvara. Det är byggt för verkliga behov som övning, undervisning, inspelning eller att bara njuta av favoritlåtar i en bekvämare tonart.
    - "Du kan:"
  bullets:
    - Ändra en låts tonart upp eller ner i halvtoner.
    - Öva i en tonart som passar din röst eller ditt instrument bättre.
    - Förbereda backing tracks, karaokeversioner och undervisningsmaterial.
    - Testa arrangemang, harmonier och kreativa pitchförflyttningar.
  versions_intro: "Pitch Changer finns i två versioner:"
  online_link_label: Ändra tonart
  online_link_suffix: ett webbläsartillägg för webbplatser, och
  offline_link_label: Pitch Changer Offline
  offline_link_suffix: en app för iPhone, iPad och Mac för filer.
online:
  title: Ändra tonart
  paragraphs:
    - Använd Ändra tonart för att enkelt byta tonart på låtar medan de redan spelar. Det är ett smidigt sätt att transponera musik utan att lämna webbläsaren.
    - Pitch Changer Online lägger tonartskontroller direkt i webbläsaren. Ändra tonart på YouTube och många andra ljudwebbplatser med bara några klick.
  bullets:
    - Ändra tonart på låtar online direkt på vilken webbplats som helst.
    - Fungerar som verktyg för att ändra tonart på YouTube och andra musikplattformar.
    - Justera pitch i halvtoner med tydliga reglage.
    - Bra för att spela med, sjunga karaoke eller lyssna i en tonart som känns bekvämare.
  perfect_for_label: "Perfekt för:"
  perfect_for_text: sångare, sångpedagoger, lärare, skolor, instrumentalister och alla som övar med videor online.
  pricing_template: "Efter gratisperioden: WEEKLY_PRICE, YEARLY_PRICE eller LIFETIME_PRICE."
  offer_templates:
